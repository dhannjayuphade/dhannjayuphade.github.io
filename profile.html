<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Page</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
transition:.4s;
overflow-x:hidden;
}

body.light{
background:linear-gradient(135deg,#f8fafc,#e2e8f0);
}

.container{
width:95%;
max-width:450px;
padding:25px;
border-radius:25px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 30px rgba(0,255,255,.2);
text-align:center;
animation:fadeIn 1s ease;
}

.profile-pic{
width:130px;
height:130px;
border-radius:50%;
border:4px solid cyan;
object-fit:cover;
box-shadow:0 0 25px cyan;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px cyan;}
to{box-shadow:0 0 40px cyan;}
}

h2{
color:white;
margin-top:15px;
}

.light h2{
color:black;
}

.bio{
margin-top:10px;
color:#ddd;
}

.light .bio{
color:#444;
}

.stats{
display:flex;
justify-content:space-around;
margin-top:20px;
color:white;
}

.light .stats{
color:black;
}

.stat{
cursor:pointer;
}

.follow-btn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00e5ff,#0077ff);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.follow-btn:hover{
transform:scale(1.08);
}

.top-buttons{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.icon-btn{
border:none;
padding:10px;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

.search{
margin-top:20px;
}

.search input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:15px;
}

.results{
margin-top:10px;
max-height:120px;
overflow:auto;
}

.results div{
padding:10px;
margin-top:5px;
background:rgba(255,255,255,.1);
border-radius:10px;
color:white;
}

.light .results div{
color:black;
}

.socials{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.socials a{
text-decoration:none;
padding:10px 15px;
border-radius:12px;
background:#1e293b;
color:white;
transition:.3s;
}

.socials a:hover{
transform:translateY(-4px);
}

.light .socials a{
background:#dbeafe;
color:black;
}

#toast{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
color:white;
padding:12px 18px;
border-radius:12px;
display:none;
z-index:1000;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div id="toast"></div>

<div class="container">

<div class="top-buttons">
<button class="icon-btn" id="themeBtn">🌙</button>
<button class="icon-btn">⚙️</button>
</div>

<img
class="profile-pic"
src="https://via.placeholder.com/150"
alt="Profile">

<h2>Dhananjay Uphade ✔️</h2>

<p class="bio">
Developer • Editor • YouTuber
</p>

<div class="stats">
<div class="stat">
<h3 id="followers">125</h3>
<p>Followers</p>
</div>

<div class="stat">
<h3 id="following">87</h3>
<p>Following</p>
</div>

<div class="stat">
<h3>14</h3>
<p>Posts</p>
</div>
</div>

<button
class="follow-btn"
id="followBtn">
Follow
</button>

<div class="search">
<input
type="text"
id="searchBox"
placeholder="Search Users...">

<div
class="results"
id="results">
</div>
</div>

<div class="socials">
<a href="#">YouTube</a>
<a href="#">GitHub</a>
<a href="#">Instagram</a>
<a href="#">Facebook</a>
</div>

</div>

<script>

let following=false;

const btn=document.getElementById("followBtn");
const followers=document.getElementById("followers");

btn.onclick=()=>{

let count=parseInt(followers.innerText);

if(!following){
count++;
btn.innerText="Following";
showToast("You followed this user");
}else{
count--;
btn.innerText="Follow";
showToast("You unfollowed this user");
}

followers.innerText=count;
following=!following;
};

const themeBtn=
document.getElementById("themeBtn");

themeBtn.onclick=()=>{

document.body.classList.toggle("light");

if(document.body.classList.contains("light")){
themeBtn.innerHTML="☀️";
}else{
themeBtn.innerHTML="🌙";
}

};

const users=[
"Dhananjay",
"Sai",
"Gaming",
"Editor",
"Developer",
"Arduino",
"Python",
"Firebase",
"GitHub"
];

const searchBox=
document.getElementById("searchBox");

const results=
document.getElementById("results");

searchBox.oninput=()=>{

let val=
searchBox.value.toLowerCase();

results.innerHTML="";

users
.filter(x=>
x.toLowerCase().includes(val)
)
.forEach(user=>{

let div=
document.createElement("div");

div.innerText=user;

results.appendChild(div);

});

};

function showToast(msg){

const toast=
document.getElementById("toast");

toast.innerText=msg;
toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},3000);

}

setTimeout(()=>{
showToast("Welcome to Profile Page");
},1000);

</script>

</body>
  </html>
