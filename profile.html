<!DOCTYPE html>
<html>
<head>
<title>Login System</title>

<style>
body{
font-family:Poppins;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}
.box{
background:#222;
padding:20px;
border-radius:10px;
margin-top:20px;
}
img{
border-radius:50%;
}
button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffcc;
margin:10px;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getDatabase(app);

// 🔐 LOGIN
window.login = async function(){

const result = await signInWithPopup(auth, provider);

const user = result.user;

// SAVE LOCAL
localStorage.setItem("user", user.displayName);
localStorage.setItem("email", user.email);
localStorage.setItem("photo", user.photoURL);

// SAVE FIREBASE
push(ref(db,"users"),{
name:user.displayName,
email:user.email,
photo:user.photoURL,
time:Date.now()
});

showProfile();
};

// 🔁 AUTO LOGIN
onAuthStateChanged(auth,(user)=>{
if(user){
localStorage.setItem("user", user.displayName);
localStorage.setItem("email", user.email);
localStorage.setItem("photo", user.photoURL);
showProfile();
}
});

// 🚪 LOGOUT
window.logout=function(){
signOut(auth);
localStorage.clear();
location.reload();
};

// 👤 PROFILE
function showProfile(){

document.getElementById("loginBox").style.display="none";
document.getElementById("profileBox").style.display="block";

document.getElementById("name").innerText = localStorage.getItem("user");
document.getElementById("email").innerText = localStorage.getItem("email");
document.getElementById("photo").src = localStorage.getItem("photo");
}

</script>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
<h2>Login</h2>
<button onclick="login()">Login with Google</button>
</div>

<!-- PROFILE -->
<div id="profileBox" class="box" style="display:none;">

<h2>👤 Profile</h2>

<img id="photo" width="100"><br>

<p>Name: <span id="name"></span></p>
<p>Email: <span id="email"></span></p>

<button onclick="logout()">Logout</button>

</div>

</body>
</html>
