<!DOCTYPE html>
<html>
<body>

<h2>User Profile</h2>

<input id="name" placeholder="Name"><br><br>
<input id="age" placeholder="Age"><br><br>

<button onclick="save()">Save</button>

<p id="msg"></p>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  projectId: "dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid = null;

// login check
onAuthStateChanged(auth, (user) => {
  if(user){
    uid = user.uid;
  } else {
    alert("Login first!");
    location.href = "login.html";
  }
});

// SAVE FUNCTION (IMPORTANT 🔥)
window.save = async () => {
  if(!uid){
    alert("User not loaded yet!");
    return;
  }

  const userName = document.getElementById("name").value;
  const userAge = document.getElementById("age").value;

  if(userName === "" || userAge === ""){
    alert("Fill all fields!");
    return;
  }

  try {
    await setDoc(doc(db, "users", uid), {
      name: userName,
      age: userAge
    });

    document.getElementById("msg").innerText = "Saved successfully!";
  } catch(e){
    document.getElementById("msg").innerText = "Error: " + e.message;
  }
};

  </script>


</body>
</html>
