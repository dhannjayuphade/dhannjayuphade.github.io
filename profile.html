<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
text-align:center;
}
.app{max-width:420px;margin:auto;padding:15px}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:15px;
margin:10px;
border-radius:15px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#00ffcc;
margin:5px;
}

img{
border-radius:50%;
border:3px solid #00ffcc;
}
</style>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* LOAD PROFILE */
window.onload = function(){

let user = localStorage.getItem("user");
let email = localStorage.getItem("email");
let photo = localStorage.getItem("photo");

if(!user){
alert("Login first");
location.href="index.html";
return;
}

// show profile
document.getElementById("name").innerText = user;
document.getElementById("email").innerText = email;
document.getElementById("photo").src = photo || "https://via.placeholder.com/100";

loadStats();

};

/* LOAD STATS */
function loadStats(){

let email = localStorage.getItem("email");

onValue(ref(db,"leaderboard"), snap => {

let data = snap.val();
if(!data) return;

let total = 0, count = 0, best = 0;
let scores = [];
let userTotals = {};

Object.values(data).forEach(d => {

// rank calculation
if(!userTotals[d.email]) userTotals[d.email] = 0;
userTotals[d.email] += Number(d.score);

// current user
if(d.email === email){

total += Number(d.score);
count++;
scores.push(d.score);

if(d.score > best) best = d.score;
}

});

// UI update
document.getElementById("totalScore").innerText = total;
document.getElementById("quizCount").innerText = count;

// rank
let sorted = Object.entries(userTotals).sort((a,b)=>b[1]-a[1]);
let rank = sorted.findIndex(u => u[0] === email) + 1;
document.getElementById("rank").innerText = "#"+rank;

// graph
drawGraph(scores);

// badges
loadBadges(total,count,best,rank);

});

}

/* GRAPH */
function drawGraph(scores){

const ctx = document.getElementById("chart");

new Chart(ctx,{
type:"line",
data:{
labels:scores.map((_,i)=>"Quiz "+(i+1)),
datasets:[{
label:"Score",
data:scores
}]
}
});

}

/* BADGES */
function loadBadges(total,count,best,rank){

let b = document.getElementById("badges");
b.innerHTML = "";

if(count>=1) b.innerHTML += "🟢 Beginner ";
if(count>=5) b.innerHTML += "🔵 Explorer ";
if(count>=10) b.innerHTML += "🟣 Master ";
if(best>=20) b.innerHTML += "🟡 Genius ";
if(rank===1) b.innerHTML += "🔴 Champion ";

}

</script>

</head>

<body>

<div class="app">

<!-- PROFILE -->
<div class="card">

<img id="photo" width="90"><br><br>

<h2 id="name"></h2>
<p id="email"></p>

</div>

<!-- STATS -->
<div class="card">

<h3>📊 Stats</h3>

<p>Total Score: <span id="totalScore">0</span></p>
<p>Quizzes Played: <span id="quizCount">0</span></p>
<p>🏆 Rank: <span id="rank">-</span></p>

</div>

<!-- BADGES -->
<div class="card">

<h3>🏅 Badges</h3>
<div id="badges"></div>

</div>

<!-- GRAPH -->
<div class="card">

<h3>📈 Score Graph</h3>
<canvas id="chart"></canvas>

</div>

<!-- ACTIONS -->
<div class="card">

<button onclick="location.href='certificates.html'">
📜 My Certificates
</button>

<button onclick="location.href='aiquiz.html'">
🎯 Play Quiz
</button>

</div>

</div>

</body>
</html>
