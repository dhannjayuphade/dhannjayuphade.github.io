<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Profile</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
text-align:center;
background:#0f172a;
color:white;
font-family:Arial;
}

#loader{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.card{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffcc;
cursor:pointer;
}
</style>

</head>

<body>

<div id="loader">Loading...</div>

<div id="app" style="display:none">

<div class="card">
<h2 id="name"></h2>
<img id="photo" width="80"><br>
<p id="email"></p>
</div>

<div class="card">
<h3>Total Score: <span id="total">0</span></h3>
</div>

<div class="card">
<button onclick="logout()">Logout</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue, set, update }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443...",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// AUTH STATE
onAuthStateChanged(auth, user => {

if(!user){
location.href="index.html";
return;
}

// SAVE / UPDATE USER DATA (IMPORTANT)
update(ref(db,"users/"+user.uid),{
name:user.displayName,
email:user.email,
photo:user.photoURL,
lastLogin:Date.now()
});

// SHOW UI
document.getElementById("name").innerText = user.displayName;
document.getElementById("email").innerText = user.email;
document.getElementById("photo").src = user.photoURL;

// load stats
loadData(user.uid);

// hide loader
document.getElementById("loader").style.display="none";
document.getElementById("app").style.display="block";

});

// LOAD SCORE
function loadData(uid){

onValue(ref(db,"leaderboard"), snap => {

let data = snap.val();
if(!data) return;

let total = 0;

Object.values(data).forEach(d=>{
if(d.uid === uid){
total += Number(d.score);
}
});

document.getElementById("total").innerText = total;

});

}

// LOGOUT
window.logout = async function(){
try{
await signOut(auth);
location.href="index.html";
}catch(e){
alert("Logout error");
}
};

</script>

</body>
</html>
