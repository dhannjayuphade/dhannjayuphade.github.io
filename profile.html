<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

  <!-- Firebase v8 (Stable for GitHub Pages) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
    .box{background:#1e293b;padding:20px;border-radius:10px;margin-top:50px;}
    img{border-radius:50%;width:100px;}
    button{padding:10px;margin:10px;border:none;border-radius:5px;cursor:pointer;}
  </style>
</head>

<body>

<div class="box">
  <h2>👤 Profile</h2>

  <img id="photo" src="">
  <h3 id="name">Loading...</h3>
  <p id="email"></p>

  <h3>🎮 Quiz Score: <span id="score">0</span></h3>

  <button onclick="login()">Login with Google</button>
  <button onclick="logout()">Logout</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  databaseURL: "https://dhannjay-website-default-rtdb.firebaseio.com",
  projectId: "dhannjay-website",
  storageBucket: "dhannjay-website.firebasestorage.app",
  messagingSenderId: "73314948186",
  appId: "1:73314948186:web:e7d64f04ba3221a21df463",
  measurementId: "G-Y76NHS7ZV8"
};

// Init
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

// 🔐 LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// 🚪 LOGOUT
function logout(){
  auth.signOut();
}

// 🔁 SESSION CHECK (AUTO LOGIN)
auth.onAuthStateChanged(user=>{
  if(user){
    // Show data
    document.getElementById("name").innerText = user.displayName;
    document.getElementById("email").innerText = user.email;
    document.getElementById("photo").src = user.photoURL;

    // Save user in DB
    db.ref("users/"+user.uid).update({
      name: user.displayName,
      email: user.email,
      photo: user.photoURL
    });

    // Load score
    db.ref("users/"+user.uid+"/score").on("value", snap=>{
      document.getElementById("score").innerText = snap.val() || 0;
    });

  } else {
    document.getElementById("name").innerText = "Please login";
    document.getElementById("email").innerText = "";
    document.getElementById("photo").src = "";
    document.getElementById("score").innerText = "0";
  }
});
</script>

</body>
</html>
