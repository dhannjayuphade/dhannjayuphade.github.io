<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>
body{
text-align:center;
background:#0f172a;
color:white;
font-family:Arial;
}

.card{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffcc;
cursor:pointer;
}

/* hide */
.hidden{display:none;}
</style>

</head>

<body>

<!-- LOGIN UI -->
<div id="loginBox" class="card">
<h2>Login</h2>
<button onclick="login()">Login with Google</button>
</div>

<!-- LOADER -->
<div id="loader" class="hidden">Loading...</div>

<!-- PROFILE UI -->
<div id="profileBox" class="hidden">

<div class="card">
<h2 id="name"></h2>
<img id="photo" width="80"><br>
<p id="email"></p>
</div>

<div class="card">
<h3>Total Score: <span id="total">0</span></h3>
</div>

<div class="card">
<button onclick="logout()">Logout</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue, set, update }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443...",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// LOGIN
window.login = function(){

const provider = new GoogleAuthProvider();

signInWithPopup(auth, provider).then(result => {

const user = result.user;

// save user
set(ref(db,"users/"+user.uid),{
name:user.displayName,
email:user.email,
photo:user.photoURL
});

});

};

// AUTH STATE
onAuthStateChanged(auth, user => {

document.getElementById("loader").classList.remove("hidden");
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("profileBox").classList.add("hidden");

if(user){

// update DB
update(ref(db,"users/"+user.uid),{
name:user.displayName,
email:user.email,
photo:user.photoURL,
lastLogin:Date.now()
});

// show profile
document.getElementById("name").innerText = user.displayName;
document.getElementById("email").innerText = user.email;
document.getElementById("photo").src = user.photoURL;

// load score
loadData(user.uid);

document.getElementById("profileBox").classList.remove("hidden");

}else{

// show login
document.getElementById("loginBox").classList.remove("hidden");

}

document.getElementById("loader").classList.add("hidden");

});

// LOAD SCORE
function loadData(uid){

onValue(ref(db,"leaderboard"), snap => {

let data = snap.val();
if(!data) return;

let total = 0;

Object.values(data).forEach(d=>{
if(d.uid === uid){
total += Number(d.score);
}
});

document.getElementById("total").innerText = total;

});

}

// LOGOUT
window.logout = function(){
signOut(auth);
};

</script>

</body>
</html>
