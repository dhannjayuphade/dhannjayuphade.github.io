<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin: 10px auto;
      width: 90%;
      max-width: 400px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #38bdf8;
      color: black;
    }

    .score {
      background: #334155;
      margin: 5px;
      padding: 8px;
      border-radius: 8px;
    }

    img {
      border-radius: 50%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Dashboard</h2>

<div class="card">
  <p id="user"></p>

  <input type="file" id="photo">
  <button onclick="uploadPhoto()">Upload Photo</button>

  <br>
  <img id="profilePic" width="100">

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<div class="card">
  <h3>Your Scores</h3>
  <div id="scores"></div>
</div>

<div class="card">
  <h3>Leaderboard 🏆</h3>
  <div id="leaderboard"></div>
</div>

<script type="module">
  import { updateProfile } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

updateProfile(auth.currentUser, {
  photoURL: url
});
import { initializeApp } from"https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getAuth, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { 
  getFirestore, collection, getDocs 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import { 
  getStorage, ref, uploadBytes, getDownloadURL 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  projectId: "dhannjay-website",
  storageBucket: "dhannjay-website.firebasestorage.app",
  messagingSenderId: "73314948186",
  appId: "1:73314948186:web:e7d64f04ba3221a21df463"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// LOGOUT
window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

// UPLOAD PHOTO
window.uploadPhoto = async function () {
  const file = document.getElementById("photo").files[0];
  const user = auth.currentUser;

  if (!file) return alert("Select image");

  const storageRef = ref(storage, "profile/" + user.uid);

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  document.getElementById("profilePic").src = url;
  alert("Photo uploaded ✅");
};

// AUTH CHECK
onAuthStateChanged(auth, async (user) => {
  if (!user) return window.location.href = "login.html";

  // EMAIL VERIFICATION CHECK
await user.reload();  // 🔥 add this line

if (!user.emailVerified) {
  alert("Verify your email first 📧");
  window.location.href = "login.html";
  return;
  }

  document.getElementById("user").innerText = user.email;

  // LOAD PHOTO
  const storageRef = ref(storage, "profile/" + user.uid + ".jpg");
  getDownloadURL(storageRef)
    .then(url => document.getElementById("profilePic").src = url)
    .catch(()=>{});

  // LOAD SCORES
  const snap = await getDocs(collection(db, "scores"));

  let userHTML = "";
  let allScores = [];

  snap.forEach(doc => {
    const d = doc.data();
    allScores.push(d);

    if (d.email === user.email) {
      userHTML += `<div class="score">${d.type}: ${d.score}</div>`;
    }
  });

  document.getElementById("scores").innerHTML = userHTML;

  // LEADERBOARD
  allScores.sort((a,b)=>b.score-a.score);

  let top = "";
  allScores.slice(0,5).forEach((d,i)=>{
    top += `<div class="score">#${i+1} ${d.email} - ${d.score}</div>`;
  });

  document.getElementById("leaderboard").innerHTML = top;
});
</script>

</body>
</html>
