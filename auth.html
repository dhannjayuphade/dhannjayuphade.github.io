<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Full Auth System</title>
<style>
body{font-family:Arial;text-align:center;padding:20px}
input,button{padding:10px;margin:5px;width:250px}
</style>
</head>
<body>

<h2>Signup</h2>
<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<button onclick="login()">Login</button>

<h2>Social Login</h2>
<button onclick="googleLogin()">Google</button>
<button onclick="githubLogin()">GitHub</button>

<h2>Phone OTP</h2>
<input id="phone" placeholder="+91XXXXXXXXXX"><br>
<div id="recaptcha"></div>
<button onclick="sendOTP()">Send OTP</button><br>
<input id="otp" placeholder="Enter OTP"><br>
<button onclick="verifyOTP()">Verify OTP</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification,
  GoogleAuthProvider,
  GithubAuthProvider,
  signInWithPopup,
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔑 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  projectId: "dhannjay-website",
  storageBucket: "dhannjay-website.firebasestorage.app",
  messagingSenderId: "73314948186",
  appId: "1:73314948186:web:e7d64f04ba3221a21df463"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 Signup
window.signup = async () => {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const userCred = await createUserWithEmailAndPassword(auth, email, pass);

  await sendEmailVerification(userCred.user);

  await setDoc(doc(db, "users", userCred.user.uid), {
    name,
    email,
    created: new Date()
  });

  alert("Signup Done + Email Sent 📩");
};

// 🔓 Email Login
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const userCred = await signInWithEmailAndPassword(auth, email, pass);

  if(userCred.user.emailVerified){
    alert("Login Success ✅");
  } else {
    alert("Verify Email First ❌");
  }
};

// 🌐 Google Login
window.googleLogin = async () => {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);

  await setDoc(doc(db, "users", result.user.uid), {
    name: result.user.displayName,
    email: result.user.email
  });

  alert("Google Login ✅");
};

// 🐙 GitHub Login
window.githubLogin = async () => {
  const provider = new GithubAuthProvider();
  const result = await signInWithPopup(auth, provider);

  await setDoc(doc(db, "users", result.user.uid), {
    name: result.user.displayName,
    email: result.user.email
  });

  alert("GitHub Login ✅");
};

// 📲 reCAPTCHA
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha', {
  size: 'normal'
});

// 📲 Send OTP
window.sendOTP = async () => {
  const phone = document.getElementById("phone").value;

  window.confirmationResult = await signInWithPhoneNumber(
    auth,
    phone,
    window.recaptchaVerifier
  );

  alert("OTP Sent 📩");
};

// 🔑 Verify OTP
window.verifyOTP = async () => {
  const code = document.getElementById("otp").value;

  const result = await window.confirmationResult.confirm(code);

  await setDoc(doc(db, "users", result.user.uid), {
    phone: result.user.phoneNumber
  });

  alert("OTP Login Success ✅");
};
</script>

</body>
  </html>
