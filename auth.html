<!DOCTYPE html>
<html>
<head>
<title>Auth System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0f172a;color:white;text-align:center;font-family:sans-serif}
input,button{padding:10px;margin:8px;border-radius:10px;border:none}
button{background:#00ffcc}
</style>

</head>

<body>

<h2>🔐 Login System</h2>

<!-- GOOGLE -->
<button onclick="googleLogin()">Google Login</button>

<hr>

<!-- EMAIL -->
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="emailSignup()">Signup</button>
<button onclick="emailLogin()">Login</button>

<hr>

<!-- PHONE -->
<input id="phone" placeholder="+91XXXXXXXXXX"><br>
<div id="recaptcha"></div>
<button onclick="sendOTP()">Send OTP</button>

<div id="otpBox" style="display:none">
<input id="otp" placeholder="Enter OTP"><br>
<button onclick="verifyOTP()">Verify</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getDatabase, ref, set }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const provider = new GoogleAuthProvider();

/* GOOGLE LOGIN */
window.googleLogin = function(){
signInWithPopup(auth, provider).then(res=>{
saveUser(res.user);
location.href="profile.html";
});
};

/* EMAIL SIGNUP */
window.emailSignup = function(){

let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,pass)
.then(res=>{
saveUser(res.user);
alert("Signup success");
});
};

/* EMAIL LOGIN */
window.emailLogin = function(){

let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,pass)
.then(res=>{
location.href="profile.html";
});
};

/* OTP SETUP */
window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha',{size:'normal'});
let confirmationResult;

/* SEND OTP */
window.sendOTP = function(){

let phone = document.getElementById("phone").value;

// Fake number detection
if(!phone.startsWith("+91") || phone.length < 13){
alert("❌ Invalid number");
return;
}

signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
.then(res=>{
confirmationResult = res;
alert("OTP Sent");
document.getElementById("otpBox").style.display="block";
});
};

/* VERIFY OTP */
window.verifyOTP = function(){

let code = document.getElementById("otp").value;

confirmationResult.confirm(code)
.then(res=>{
saveUser(res.user);
location.href="profile.html";
});
};

/* SAVE USER DATABASE */
function saveUser(user){

set(ref(db,"users/"+user.uid),{
name:user.displayName || "User",
email:user.email || "",
phone:user.phoneNumber || "",
time:Date.now()
});

}

</script>

</body>
  </html>
