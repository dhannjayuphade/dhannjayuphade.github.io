<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dhananjay Pro Quiz</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;text-align:center;}
input,button,select{padding:10px;margin:8px;width:90%;border-radius:10px;border:none;}
button{background:#22c55e;color:white;font-weight:bold;}
.hidden{display:none;}
.card{background:#1e293b;padding:15px;border-radius:10px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Enter Details</h2>
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<button onclick="next()">Next</button>
</div>

<!-- LANGUAGE -->
<div id="lang" class="hidden">
<h2>Select Language</h2>
<select id="language">
<option>English</option>
<option>Marathi</option>
<option>Hindi</option>
</select>
<button onclick="homePage()">Next</button>
</div>

<!-- HOME -->
<div id="home" class="hidden">
<h2>Profile</h2>
<input type="file">
<p id="info"></p>
<select onchange="changeLang(this.value)">
<option>English</option>
<option>Marathi</option>
<option>Hindi</option>
</select>
<button onclick="start()">Start Quiz</button>

<div id="leaderboard"></div>
</div>

<!-- QUIZ TYPE -->
<div id="quizType" class="hidden">
<h2>Select Quiz</h2>
<button onclick="begin()">GK</button>
<button onclick="begin()">Science</button>
<button onclick="begin()">History</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<h3 id="timer"></h3>
<h2 id="q"></h2>
<div id="opt"></div>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
<h2 id="scoreBox"></h2>
<button onclick="downloadPDF()">Download Certificate</button>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

<script>

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  projectId: "dhannjay-website",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Variables
let user={},questions=[],i=0,score=0,time=30,t;

// Login
function next(){
  user.name=name.value;
  user.mobile=mobile.value;
  user.email=email.value;
  login.classList.add("hidden");
  lang.classList.remove("hidden");
}

// Home
function homePage(){
  user.lang=language.value;
  info.innerText=`${user.name} | ${user.mobile}`;
  lang.classList.add("hidden");
  home.classList.remove("hidden");
  loadLeaderboard();
}

// Start
function start(){
  home.classList.add("hidden");
  quizType.classList.remove("hidden");
}

// Quiz Start
function begin(){
  quizType.classList.add("hidden");
  quiz.classList.remove("hidden");

  questions = Array.from({length:30},(_,x)=>({
    q:`Q${x+1}: 2+2 = ?`,
    o:["3","4","5","6"],
    a:1
  }));

  i=0;score=0;
  startTimer();
  loadQ();
}

// Timer
function startTimer(){
  time=30;
  t=setInterval(()=>{
    timer.innerText="Time: "+time;
    time--;
    if(time<0){
      nextQ();
    }
  },1000);
}

// Load Question
function loadQ(){
  let qu=questions[i];
  q.innerText=qu.q;
  opt.innerHTML="";
  qu.o.forEach((o,idx)=>{
    let b=document.createElement("button");
    b.innerText=o;
    b.onclick=()=>check(idx);
    opt.appendChild(b);
  });
}

// Answer
function check(idx){
  sound.play();
  if(idx===questions[i].a) score++;
  nextQ();
}

// Next
function nextQ(){
  i++;
  if(i<questions.length){
    loadQ();
  }else{
    clearInterval(t);
    showResult();
  }
}

// Result
function showResult(){
  quiz.classList.add("hidden");
  result.classList.remove("hidden");

  scoreBox.innerText=`Score: ${score}/30`;

  saveScore();
}

// Save Firebase
function saveScore(){
  db.collection("scores").add({
    name:user.name,
    score:score,
    date:new Date().toLocaleString()
  });
}

// Leaderboard
function loadLeaderboard(){
  db.collection("scores")
  .orderBy("score","desc")
  .limit(5)
  .get()
  .then(snap=>{
    leaderboard.innerHTML="<h3>Top Players</h3>";
    snap.forEach(doc=>{
      let d=doc.data();
      leaderboard.innerHTML+=`<p>${d.name} - ${d.score}</p>`;
    });
  });
}

// PDF
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();

  doc.text("QUIZ CERTIFICATE",20,20);
  doc.text(`Name: ${user.name}`,20,40);
  doc.text(`Score: ${score}/30`,20,50);
  doc.text(`Owner: Dhannjay Uphade`,20,60);
  doc.text(`Date: ${new Date().toLocaleString()}`,20,70);

  doc.save("certificate.pdf");
}

</script>

</body>
  </html>
