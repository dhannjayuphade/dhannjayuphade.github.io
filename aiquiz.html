<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push, onValue, set }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getDatabase(app);

/* LOGIN */
window.googleLogin = async function(){
const result = await signInWithPopup(auth, provider);
localStorage.setItem("user", result.user.displayName);
showHome();
};

onAuthStateChanged(auth,(user)=>{
if(user){
localStorage.setItem("user",user.displayName);
showHome();
}
});

/* LOGOUT */
window.logout=function(){
signOut(auth);
localStorage.clear();
location.reload();
};

/* SCORE */
window.saveScore=function(score){
push(ref(db,"leaderboard"),{
name:localStorage.getItem("user"),
score:score
});
};

/* LEADERBOARD FIX */
window.loadLeaderboard=function(){
const list=document.getElementById("leaderList");

onValue(ref(db,"leaderboard"),snap=>{
let data=snap.val();
list.innerHTML="";
if(!data)return;

let arr=Object.values(data);
arr.sort((a,b)=>b.score-a.score);

arr.slice(0,10).forEach((p,i)=>{
list.innerHTML+=`<li>#${i+1} ${p.name} - ${p.score}</li>`;
});
});
};

/* CERTIFICATE FIX */
window.generatePDF=async function(){

document.getElementById("certificateBox").style.display="block";

let user=localStorage.getItem("user");
let score=localStorage.getItem("score");

document.getElementById("certName").innerText=user;

let today=new Date().toLocaleDateString();
document.getElementById("certDate").innerText=today;

let id="QUIZ-"+currentTopic+"-"+Date.now();
document.getElementById("certID").innerText=id;
  let verifyURL = "https://dhannjayuphade.github.io/verify.html?id=" + id;

// QR generate
document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"), {
  text: verifyURL,
  width: 100,
  height: 100
});

set(ref(db,"certificates/"+id),{
name:user,
score:score,
topic:currentTopic,
date:today
});

let title=currentTopic.toUpperCase()+" QUIZ CERTIFICATE";
let text=`Score ${score} in ${currentTopic.toUpperCase()}`;

document.getElementById("quizTitle").innerText=title;
document.getElementById("certText").innerText=text;

await new Promise(r=>setTimeout(r,1200));
const cert=document.getElementById("certificate");
const canvas=await html2canvas(cert);
const img=canvas.toDataURL("image/png");

const {jsPDF}=window.jspdf;
const pdf=new jsPDF("landscape");

pdf.addImage(img,'PNG',10,10,270,180);
pdf.save(title+".pdf");

document.getElementById("certificateBox").style.display="none";
};

</script>

/* QUIZ */
function startQuiz(topic){
currentTopic=topic;
current=questions[topic];
i=0;score=0;

document.getElementById("homeBox").style.display="none";
document.getElementById("quizBox").style.display="block";

showQ();
timerStart();
}

function showQ(){
if(i>=current.length){showResult();return;}

document.getElementById("question").innerText=current[i].q;
let opt=document.getElementById("options");
opt.innerHTML="";

current[i].o.forEach(v=>{
let b=document.createElement("button");
b.innerText=v;
b.onclick=()=>check(v);
opt.appendChild(b);
});
}

function check(ans){
if(ans===current[i].a)score++;
i++;
showQ();
}

function timerStart(){
let t=300;
let x=setInterval(()=>{
t--;
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("timer").innerText=`${m}:${s<10?"0"+s:s}`;
if(t<=0){clearInterval(x);showResult();}
},1000);
}
function goHome(){
  document.getElementById("resultBox").style.display="none";
  document.getElementById("homeBox").style.display="block";
}
function showResult(){
document.getElementById("quizBox").style.display="none";
document.getElementById("resultBox").style.display="block";
document.getElementById("scoreText").innerText="Score: "+score;

localStorage.setItem("score",score);
saveScore(score);
loadLeaderboard();
}
