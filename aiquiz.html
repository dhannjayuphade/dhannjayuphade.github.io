<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dhananjay Pro Quiz</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}
input,button,select{
  padding:10px;
  margin:8px;
  width:90%;
  border-radius:10px;
  border:none;
}
button{background:#22c55e;color:white;font-weight:bold;}
.hidden{display:none;}
.card{background:#1e293b;padding:15px;border-radius:10px;}
</style>
</head>

<body>

<div id="login">
<h2>Enter Details</h2>
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<button onclick="next()">Next</button>
</div>

<div id="lang" class="hidden">
<h2>Select Language</h2>
<select id="language">
<option>English</option>
<option>Marathi</option>
<option>Hindi</option>
</select>
<button onclick="homePage()">Next</button>
</div>

<div id="home" class="hidden">
<h2>Profile</h2>
<input type="file">
<p id="info"></p>
<select onchange="changeLang(this.value)">
<option>English</option>
<option>Marathi</option>
<option>Hindi</option>
</select>
<button onclick="start()">Start Quiz</button>
</div>

<div id="quizType" class="hidden">
<h2>Select Quiz</h2>
<button onclick="begin('gk')">GK</button>
<button onclick="begin('science')">Science</button>
<button onclick="begin('history')">History</button>
</div>

<div id="quiz" class="hidden">
<h3 id="timer"></h3>
<h2 id="q"></h2>
<div id="opt"></div>
</div>

<div id="result" class="hidden">
<h2 id="score"></h2>
<button onclick="downloadPDF()">Download Certificate</button>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

<script>

// Firebase config (replace with your)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
};
firebase.initializeApp(firebaseConfig);

let user={},questions=[],i=0,score=0,time=30,timer;

function next(){
  user.name=name.value;
  user.mobile=mobile.value;
  user.email=email.value;
  login.classList.add("hidden");
  lang.classList.remove("hidden");
}

function homePage(){
  user.lang=language.value;
  info.innerText=`${user.name} | ${user.mobile}`;
  lang.classList.add("hidden");
  home.classList.remove("hidden");
}

function start(){
  home.classList.add("hidden");
  quizType.classList.remove("hidden");
}

function begin(type){
  quizType.classList.add("hidden");
  quiz.classList.remove("hidden");

  // 30 questions
  questions = Array.from({length:30},(_,x)=>({
    q:`Q${x+1}: 2+2?`,
    o:["3","4","5","6"],
    a:1
  }));

  i=0;score=0;
  startTimer();
  load();
}

function startTimer(){
  time=30;
  timer=setInterval(()=>{
    timerBox.innerText="Time: "+time;
    time--;
    if(time<0){clearInterval(timer);nextQ();}
  },1000);
}

function load(){
  let qu=questions[i];
  q.innerText=qu.q;
  opt.innerHTML="";
  qu.o.forEach((o,idx)=>{
    let b=document.createElement("button");
    b.innerText=o;
    b.onclick=()=>ans(idx);
    opt.appendChild(b);
  });
}

function ans(idx){
  clickSound.play();
  if(idx===questions[i].a)score++;
  nextQ();
}

function nextQ(){
  i++;
  if(i<questions.length){
    load();
  }else{
    showResult();
  }
}

function showResult(){
  quiz.classList.add("hidden");
  result.classList.remove("hidden");

  score.innerText=`Score: ${score}/30`;

  // Leaderboard save
  let lb=JSON.parse(localStorage.getItem("lb")||"[]");
  lb.push({name:user.name,score});
  localStorage.setItem("lb",JSON.stringify(lb));
}

function downloadPDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();

  doc.text("QUIZ CERTIFICATE",20,20);
  doc.text(`Name: ${user.name}`,20,40);
  doc.text(`Score: ${score}/30`,20,50);
  doc.text(`Owner: Dhannjay Uphade`,20,60);
  doc.text(`Date: ${new Date().toLocaleString()}`,20,70);

  doc.save("certificate.pdf");
}

</script>

</body>
  </html>
