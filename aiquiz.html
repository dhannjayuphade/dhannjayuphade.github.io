<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Hub Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#1f1c2c,#928dab);color:white;text-align:center}
.app{max-width:400px;margin:auto;padding:15px}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#00ffcc}
.card{background:#222;padding:10px;margin:10px;border-radius:10px}
</style>

<!-- Firebase + Auth + DB -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push, onValue }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  databaseURL: "https://dhannjay-website-default-rtdb.firebaseio.com",
  projectId: "dhannjay-website"
};

const app = initializeApp(firebaseConfig);

// AUTH
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// DATABASE
const db = getDatabase(app);

// GOOGLE LOGIN
window.googleLogin = async function(){
  const result = await signInWithPopup(auth, provider);
  localStorage.setItem("user", result.user.displayName);
  showHome();
}

// AUTO LOGIN
onAuthStateChanged(auth,(user)=>{
  if(user){
    localStorage.setItem("user", user.displayName);
    showHome();
  }
});

// LOGOUT
window.logout = function(){
  signOut(auth);
  localStorage.removeItem("user");
  location.reload();
}

// SAVE SCORE
window.saveScore = function(score){
  push(ref(db,"leaderboard"),{
    name:localStorage.getItem("user"),
    score:score
  });
}

// LOAD LEADERBOARD
window.loadLeaderboard = function(){
  onValue(ref(db,"leaderboard"),(snap)=>{
    let data=snap.val();
    let list=document.getElementById("leaderList");
    list.innerHTML="";
    if(data){
      let arr=Object.values(data);
      arr.sort((a,b)=>b.score-a.score);
      arr.slice(0,10).forEach((p,i)=>{
        list.innerHTML+=`<li>#${i+1} ${p.name} - ${p.score}</li>`;
      });
    }
  });
}
</script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>
<div class="app">

<!-- LOGIN -->
<div id="loginBox">
<h2>Quiz App</h2>
<button onclick="googleLogin()">🔐 Login with Google</button>
</div>

<!-- HOME -->
<div id="homeBox" style="display:none;">
<h3>👋 <span id="userName"></span></h3>

<div class="card" onclick="startQuiz('gk')">GK Quiz</div>
<div class="card" onclick="startQuiz('science')">Science Quiz</div>
<div class="card" onclick="startQuiz('history')">History Quiz</div>

<div class="card" onclick="loadLeaderboard()">🏆 Leaderboard</div>

<button onclick="logout()">Logout</button>
</div>

<!-- QUIZ -->
<div id="quizBox" style="display:none;">
<h3 id="timer">5:00</h3>
<h2 id="question"></h2>
<div id="options"></div>
</div>

<!-- RESULT -->
<div id="resultBox" style="display:none;">
<h2 id="scoreText"></h2>
<button onclick="generatePDF()">🎓 Certificate</button>
<button onclick="goHome()">Home</button>
</div>

<!-- LEADERBOARD -->
<ul id="leaderList"></ul>

</div>

<script>

// HOME UI
function showHome(){
loginBox.style.display="none";
homeBox.style.display="block";
quizBox.style.display="none";
resultBox.style.display="none";
userName.innerText=localStorage.getItem("user");
}

// QUESTIONS
let questions={
gk:[{q:"Capital of India?",o:["Mumbai","Delhi","Pune","Nagpur"],a:"Delhi"}],
science:[{q:"Water formula?",o:["CO2","H2O","O2","NaCl"],a:"H2O"}],
history:[{q:"First PM India?",o:["Nehru","Gandhi","Patel","Modi"],a:"Nehru"}]
};

let current=[],i=0,score=0;

// START QUIZ
function startQuiz(topic){
current=questions[topic];
i=0;score=0;
homeBox.style.display="none";
quizBox.style.display="block";
showQ();
timerStart();
}

// SHOW QUESTION
function showQ(){
if(i>=current.length){showResult();return;}
question.innerText=current[i].q;
options.innerHTML="";
current[i].o.forEach(v=>{
options.innerHTML+=`<button onclick="check('${v}')">${v}</button>`;
});
}

// CHECK
function check(ans){
if(ans===current[i].a) score++;
i++;showQ();
}

// TIMER
let t;
function timerStart(){
let time=300;
t=setInterval(()=>{
time--;
timer.innerText=Math.floor(time/60)+":"+time%60;
if(time<=0){clearInterval(t);showResult();}
},1000);
}

// RESULT
function showResult(){
quizBox.style.display="none";
resultBox.style.display="block";
scoreText.innerText="Score: "+score;

localStorage.setItem("score",score);
saveScore(score);
loadLeaderboard();
}

function goHome(){showHome();}

// PDF
async function generatePDF(){
const { jsPDF } = window.jspdf;
let pdf=new jsPDF();
pdf.text("Certificate",80,20);
pdf.text("Name: "+localStorage.getItem("user"),20,50);
pdf.text("Score: "+localStorage.getItem("score"),20,70);
pdf.save("certificate.pdf");
}

</script>
<foter>© Dhannjay uphade 🇮🇳 </foter>
</body>
  </html>
