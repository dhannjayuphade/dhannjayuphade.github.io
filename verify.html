<!DOCTYPE html>
<html>
<head>
<title>Verify Certificate</title>

<style>
body{
font-family:Poppins;
text-align:center;
background:#111;
color:white;
padding:20px;
}
.box{
background:#222;
padding:20px;
border-radius:10px;
margin-top:20px;
}
input{
padding:10px;
width:80%;
border-radius:8px;
border:none;
margin:10px;
}
button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffcc;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 FUNCTION
window.verifyNow = async function(id){

let result = document.getElementById("result");

if(!id){
result.innerText="❌ Enter Certificate ID";
return;
}

result.innerText="Checking...";

try{

const snap = await get(ref(db,"certificates/"+id));

if(snap.exists()){
let d = snap.val();

result.innerHTML = `
<div class="box">
<h2>✅ Certificate Verified</h2>
<p><b>Name:</b> ${d.name}</p>
<p><b>Topic:</b> ${d.topic}</p>
<p><b>Score:</b> ${d.score}</p>
<p><b>Date:</b> ${d.date}</p>
<p><b>ID:</b> ${id}</p>
</div>
`;
}else{
result.innerText="❌ Invalid Certificate ID";
}

}catch(e){
result.innerText="❌ Error loading data";
}

}

// 🔥 AUTO VERIFY (QR)
window.onload = function(){

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){
document.getElementById("verifyID").value = id;
verifyNow(id);
}

}
</script>

</head>

<body>

<h1>🔍 Certificate Verification</h1>

<!-- 🔥 MANUAL INPUT -->
<input id="verifyID" placeholder="Enter Certificate ID">
<br>
<button onclick="verifyNow(document.getElementById('verifyID').value)">
Verify
</button>

<p id="result"></p>

</body>
</html>
