<!DOCTYPE html>
<html>
<head>
<title>Verify Certificate</title>
<style>
body{font-family:Poppins;text-align:center;background:#111;color:white;padding:20px}
.box{background:#222;padding:20px;border-radius:10px}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

window.onload = async function(){

if(!id){
document.getElementById("result").innerText="❌ No ID found";
return;
}

const snap = await get(ref(db,"certificates/"+id));

if(snap.exists()){
let d = snap.val();

document.getElementById("result").innerHTML = `
<div class="box">
<h2>✅ Certificate Verified</h2>
<p><b>Name:</b> ${d.name}</p>
<p><b>Topic:</b> ${d.topic}</p>
<p><b>Score:</b> ${d.score}</p>
<p><b>Date:</b> ${d.date}</p>
<p><b>ID:</b> ${id}</p>
</div>
`;
}else{
document.getElementById("result").innerText="❌ Invalid Certificate";
}

}
</script>

</head>

<body>

<h1>🔍 Certificate Verification</h1>
<div id="result">Checking...</div>

</body>
  </html>
