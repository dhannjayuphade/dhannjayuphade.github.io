<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Horror House</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}

#inventory{
position:absolute;
bottom:10px;
right:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}

#joystick{
position:absolute;
bottom:30px;
left:30px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.2);
}

#stick{
width:60px;
height:60px;
background:white;
border-radius:50%;
position:absolute;
left:30px;
top:30px;
}

</style>
</head>

<body>

<div id="ui">👻 Mission: Find the key and escape</div>

<div id="inventory">
Inventory: <span id="inv">Empty</span>
</div>

<div id="joystick">
<div id="stick"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene=new THREE.Scene()

scene.fog=new THREE.Fog(0x000000,20,120)

let camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer=new THREE.WebGLRenderer({antialias:true})
renderer.shadowMap.enabled=true
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.set(0,2,8)

let ambient=new THREE.AmbientLight(0x555555)
scene.add(ambient)

let moon=new THREE.DirectionalLight(0xaaaaee,0.6)
moon.position.set(20,40,10)
moon.castShadow=true
scene.add(moon)

let flashlight=new THREE.SpotLight(0xffffff,2,40,0.6)
flashlight.castShadow=true
camera.add(flashlight)

scene.add(camera)

let floor=new THREE.Mesh(
new THREE.PlaneGeometry(60,60),
new THREE.MeshStandardMaterial({color:0x333333})
)

floor.rotation.x=-Math.PI/2
floor.receiveShadow=true
scene.add(floor)

function wall(x,z,w,d){

let mesh=new THREE.Mesh(
new THREE.BoxGeometry(w,4,d),
new THREE.MeshStandardMaterial({color:0x444444})
)

mesh.position.set(x,2,z)
mesh.castShadow=true
mesh.receiveShadow=true
scene.add(mesh)

}

wall(0,-15,30,1)
wall(-15,0,1,30)
wall(15,0,1,30)
wall(0,15,30,1)

wall(0,0,1,10)
wall(5,0,1,10)

let door=new THREE.Mesh(
new THREE.BoxGeometry(1,3,0.2),
new THREE.MeshStandardMaterial({color:0x663300})
)

door.position.set(0,1.5,-5)
scene.add(door)

let doorOpen=false

let key=new THREE.Mesh(
new THREE.BoxGeometry(0.5,0.5,0.5),
new THREE.MeshStandardMaterial({color:0xffff00})
)

key.position.set(8,1,0)
scene.add(key)

let inventory="Empty"

document.addEventListener("click",()=>{

if(camera.position.distanceTo(key.position)<2 && key.visible){

key.visible=false
inventory="Key"
document.getElementById("inv").innerText="Key"

}

if(camera.position.distanceTo(door.position)<3 && inventory==="Key"){

door.rotation.y=Math.PI/2
doorOpen=true

}

})

let moveX=0
let moveZ=0

function animate(){

requestAnimationFrame(animate)

camera.position.x+=moveX
camera.position.z+=moveZ

flashlight.position.copy(camera.position)

renderer.render(scene,camera)

}

animate()

let joystick=document.getElementById("joystick")
let stick=document.getElementById("stick")

joystick.addEventListener("touchmove",e=>{

let rect=joystick.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left-60
let y=e.touches[0].clientY-rect.top-60

stick.style.left=(x+30)+"px"
stick.style.top=(y+30)+"px"

moveX=x*0.02
moveZ=y*0.02

})

joystick.addEventListener("touchend",()=>{

stick.style.left="30px"
stick.style.top="30px"

moveX=0
moveZ=0

})

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchmove",e=>{

let dx=e.touches[0].clientX-startX

camera.rotation.y-=dx*0.004

startX=e.touches[0].clientX

})

</script>

</body>
</html>
