<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Hub Admin</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}
header{padding:18px;text-align:center;background:#111827}
h1{margin:0;color:#00ffcc}
.container{padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.card{background:#1e293b;border-radius:14px;padding:12px;cursor:pointer}
.card img{width:60px;height:60px;border-radius:50%}
.section{margin-top:20px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center}
.modal-content{background:#1e293b;padding:20px;border-radius:12px;max-width:500px;width:90%}
button{padding:8px 12px;border:none;border-radius:8px}
</style>
</head>
<body>
<header><h1>⚡ Quiz Hub Admin Dashboard</h1></header>

<div class="container">
<h2>👥 Users</h2>
<div id="users" class="grid"></div>

<div class="section">
<h2>🏆 Certificates</h2>
<div id="certs" class="grid"></div>
</div>
</div>

<div id="modal" class="modal">
  <div id="modalContent" class="modal-content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const usersDiv=document.getElementById("users");
const certsDiv=document.getElementById("certs");

onValue(ref(db,"users"),snap=>{
 const data=snap.val()||{};
 usersDiv.innerHTML="";
 Object.entries(data).forEach(([uid,u])=>{
   const d=document.createElement("div");
   d.className="card";
   d.innerHTML=`<img src="${u.photo||''}"><h3>${u.name||'Unknown'}</h3><p>Score: ${u.score||0}</p>`;
   d.onclick=()=>show(`<h2>${u.name||''}</h2><img src="${u.photo||''}" width="100"><p>UID: ${uid}</p><p>Score: ${u.score||0}</p>`);
   usersDiv.appendChild(d);
 });
});

onValue(ref(db,"certificates"),snap=>{
 const data=snap.val()||{};
 certsDiv.innerHTML="";
 Object.entries(data).forEach(([id,c])=>{
   const d=document.createElement("div");
   d.className="card";
   d.innerHTML=`<h3>${c.name||''}</h3><p>${c.topic||''}</p><p>Score: ${c.score||''}</p>`;
   d.onclick=()=>show(`<h2>Certificate</h2><p>ID: ${id}</p><p>Name: ${c.name||''}</p><p>Topic: ${c.topic||''}</p><p>Score: ${c.score||''}</p><p>Date: ${c.date||''}</p>`);
   certsDiv.appendChild(d);
 });
});

window.show=(html)=>{
 document.getElementById("modal").style.display="flex";
 document.getElementById("modalContent").innerHTML=html+'<br><br><button onclick="document.getElementById(\'modal\').style.display=\'none\'">Close</button>';
}
</script>
</body>
</html>
