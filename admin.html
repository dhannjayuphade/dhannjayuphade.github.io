<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}
.top{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
}
.card{
background:#1e293b;
margin:10px;
padding:15px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,255,200,0.2);
}
button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#00ffcc;
cursor:pointer;
margin:5px;
}
input{
padding:8px;
border-radius:8px;
border:none;
margin:5px;
}
</style>
</head>

<body>

<!-- 🔐 PASSWORD PROTECTION -->
<script>
let pass = prompt("Enter Admin Password");
if(pass !== "Dhannjay"){
alert("Access Denied");
document.body.innerHTML="";
}
</script>

<div class="top">
<h3>⚙️ Admin Panel</h3>
<button onclick="location.href='index.html'">🏠 Home</button>
</div>

<!-- STATS -->
<div class="card">
<h2>📊 Stats</h2>
<p>Total Users: <span id="users">0</span></p>
<p>Total Certificates: <span id="certs">0</span></p>
<p>Total Attempts: <span id="attempts">0</span></p>
</div>

<!-- SEARCH CERT -->
<div class="card">
<h2>🔍 Search Certificate</h2>
<input id="searchID" placeholder="Enter Certificate ID">
<button onclick="searchCert()">Search</button>
<div id="searchResult"></div>
</div>

<!-- LEADERBOARD -->
<div class="card">
<h2>🏆 Leaderboard</h2>
<ul id="leaderList"></ul>
</div>

<!-- CERTIFICATES -->
<div class="card">
<h2>📜 All Certificates</h2>
<div id="certList"></div>
</div>

<!-- USERS -->
<div class="card">
<h2>👤 Users</h2>
<div id="userList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let userSet = new Set();

/* 📊 LOAD DATA */
onValue(ref(db,"leaderboard"), snap=>{
let data = snap.val();
let list = document.getElementById("leaderList");
list.innerHTML="";

if(!data)return;

let arr = Object.values(data);
document.getElementById("attempts").innerText = arr.length;

arr.sort((a,b)=>b.score-a.score);

arr.slice(0,10).forEach(p=>{
list.innerHTML += `<li>${p.name} - ${p.score}</li>`;
userSet.add(p.name);
});

document.getElementById("users").innerText = userSet.size;
});

/* 📜 CERTIFICATES */
onValue(ref(db,"certificates"), snap=>{
let data = snap.val();
let box = document.getElementById("certList");
box.innerHTML="";

if(!data)return;

let arr = Object.entries(data);

document.getElementById("certs").innerText = arr.length;

arr.slice(0,20).forEach(([id,c])=>{
box.innerHTML += `
<div class="card">
<p><b>${c.name}</b></p>
<p>${c.topic} | Score: ${c.score}</p>
<p>ID: ${id}</p>
<button onclick="deleteCert('${id}')">Delete</button>
</div>
`;
});
});

/* 🗑 DELETE */
window.deleteCert = function(id){
if(confirm("Delete this certificate?")){
remove(ref(db,"certificates/"+id));
}
};

/* 🔍 SEARCH */
window.searchCert = function(){
let id = document.getElementById("searchID").value;

onValue(ref(db,"certificates/"+id), snap=>{
let data = snap.val();
let box = document.getElementById("searchResult");

if(!data){
box.innerHTML = "❌ Not Found";
return;
}

box.innerHTML = `
<p>Name: ${data.name}</p>
<p>Score: ${data.score}</p>
<p>Topic: ${data.topic}</p>
<p>Date: ${data.date}</p>
`;
});
};

</script>

</body>
  </html>
