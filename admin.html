<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
font-family:Poppins;
background:#111;
color:white;
text-align:center;
padding:20px;
}
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}
th,td{
border:1px solid #444;
padding:8px;
}
button{
padding:5px 10px;
border:none;
border-radius:6px;
background:red;
color:white;
cursor:pointer;
}
input{
padding:10px;
width:70%;
border-radius:8px;
border:none;
margin:10px;
}
.searchBtn{
background:#00ffcc;
color:black;
}
</style>

<script type="module">

// 🔐 PASSWORD PROTECTION
let pass = prompt("Enter Admin Password");

if(pass !== "dhannjay550"){
alert("Access Denied");
document.body.innerHTML="";
throw new Error("Blocked");
}

// 🔥 FIREBASE IMPORT
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, remove }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 CONFIG
const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 LOAD ALL CERTIFICATES
function loadData(){

onValue(ref(db,"certificates"),snap=>{

let data = snap.val();
let table = document.getElementById("data");
table.innerHTML="";

if(!data){
table.innerHTML="<tr><td colspan='6'>No Data</td></tr>";
return;
}

Object.entries(data).forEach(([id,d])=>{

table.innerHTML += `
<tr>
<td>${id}</td>
<td>${d.name}</td>
<td>${d.topic}</td>
<td>${d.score}</td>
<td>${d.date}</td>
<td><button onclick="deleteCert('${id}')">Delete</button></td>
</tr>
`;

});

});

}

// 🔥 DELETE
window.deleteCert = function(id){

if(confirm("Delete this certificate?")){
remove(ref(db,"certificates/"+id));
}

};

// 🔥 SEARCH
window.searchCert = function(){

let id = document.getElementById("search").value.trim();
let table = document.getElementById("data");

if(!id){
loadData();
return;
}

onValue(ref(db,"certificates/"+id),snap=>{

table.innerHTML="";

if(snap.exists()){
let d = snap.val();

table.innerHTML = `
<tr>
<td>${id}</td>
<td>${d.name}</td>
<td>${d.topic}</td>
<td>${d.score}</td>
<td>${d.date}</td>
<td><button onclick="deleteCert('${id}')">Delete</button></td>
</tr>
`;
}else{
table.innerHTML="<tr><td colspan='6'>No Data Found</td></tr>";
}

},{onlyOnce:true});

};

// 🔥 INIT
window.onload = loadData;

</script>

</head>

<body>

<h1>🔥 Admin Dashboard</h1>

<input id="search" placeholder="Enter Certificate ID">
<button class="searchBtn" onclick="searchCert()">Search</button>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Topic</th>
<th>Score</th>
<th>Date</th>
<th>Action</th>
</tr>

<tbody id="data"></tbody>

</table>

</body>
  </html>
