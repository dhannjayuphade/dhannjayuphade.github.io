<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#0f172a;color:white;margin:0;text-align:center;}
.top{background:#111;padding:10px;display:flex;justify-content:space-between;}
.card{background:#1e293b;margin:10px;padding:15px;border-radius:12px;}
img{border-radius:50%;width:40px;}
</style>
</head>

<body>

<script>
let pass = prompt("Enter Admin Password");
if(pass !== "Dhannjay"){
alert("Access Denied");
document.body.innerHTML="";
}
</script>

<div class="top">
<h3>⚙️ Admin Panel</h3>
<button onclick="location.href='index.html'">🏠 Home</button>
</div>

<div class="card">
<h2>📊 Stats</h2>
<p>Total Users: <span id="users">0</span></p>
<p>Total Attempts: <span id="attempts">0</span></p>
</div>

<div class="card">
<h2>🏆 Leaderboard</h2>
<div id="leaderList"></div>
</div>

<div class="card">
<h2>👤 Users Full Data</h2>
<input id="search" placeholder="Search name">
<div id="userList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// USERS
onValue(ref(db,"users"), snap=>{
let data = snap.val();
let box = document.getElementById("userList");
box.innerHTML="";

if(!data)return;

let arr = Object.values(data);

// total users
document.getElementById("users").innerText = arr.length;

// total attempts
let totalAttempts = arr.reduce((a,b)=>a+(b.attempts||0),0);
document.getElementById("attempts").innerText = totalAttempts;

// sort by score
arr.sort((a,b)=>(b.score||0)-(a.score||0));

// show all users
arr.forEach(u=>{
box.innerHTML += `
<div class="card">
<img src="${u.photo}">
<h3>${u.name}</h3>
<p>${u.email}</p>
<p>Score: ${u.score||0}</p>
<p>Attempts: ${u.attempts||0}</p>
<p>Last Played: ${new Date(u.lastPlayed||0).toLocaleString()}</p>
</div>
`;
});

});

// LEADERBOARD
onValue(ref(db,"leaderboard"), snap=>{
let data = snap.val();
let box = document.getElementById("leaderList");
box.innerHTML="";

if(!data)return;

let arr = Object.values(data);

arr.sort((a,b)=>b.score-a.score);

arr.slice(0,10).forEach((p,i)=>{
box.innerHTML += `<p>#${i+1} ${p.name} - ${p.score}</p>`;
});
});

</script>

</body>
</html>
