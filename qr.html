<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Studio Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
-45deg,
#667eea,
#764ba2,
#6a11cb,
#2575fc
);
background-size:400% 400%;
animation:bg 12s ease infinite;
padding:20px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:100%;
max-width:600px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 8px 32px rgba(0,0,0,0.2);
text-align:center;
color:white;
}

h1{
margin-bottom:20px;
font-size:2rem;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:15px;
font-size:16px;
margin-bottom:15px;
background:rgba(255,255,255,0.2);
color:white;
}

input::placeholder{
color:#ddd;
}

.btn{
padding:14px 25px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
margin:5px;
transition:0.3s;
}

.generate{
background:#00c853;
color:white;
}

.download{
background:#2196f3;
color:white;
}

.clear{
background:#ff5252;
color:white;
}

.btn:hover{
transform:translateY(-3px);
}

#qrcode{
margin-top:25px;
display:flex;
justify-content:center;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.1);
}

.footer{
margin-top:20px;
font-size:14px;
opacity:0.8;
}
</style>
</head>
<body>

<div class="container">

<h1>QR Studio Pro</h1>

<input
type="text"
id="text"
placeholder="Enter URL or Text"
>

<button
class="btn generate"
onclick="generateQR()">
Generate QR
</button>

<button
class="btn download"
onclick="downloadQR()">
Download QR
</button>

<button
class="btn clear"
onclick="clearQR()">
Clear
</button>

<div id="qrcode"></div>

<div class="footer">
Created by Dhananjay
</div>

</div>

<script>

function generateQR(){

let text=document.getElementById("text").value;

if(text===""){
alert("Please enter text or URL");
return;
}

document.getElementById("qrcode").innerHTML="";

new QRCode(
document.getElementById("qrcode"),
{
text:text,
width:250,
height:250,
colorDark:"#000000",
colorLight:"#ffffff",
correctLevel:QRCode.CorrectLevel.H
}
);

}

function downloadQR(){

let img=document.querySelector("#qrcode img");

if(!img){
alert("Generate QR First");
return;
}

let link=document.createElement("a");

link.href=img.src;
link.download="QR-Code.png";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

}

function clearQR(){

document.getElementById("text").value="";
document.getElementById("qrcode").innerHTML="";

}

</script>
<h1>made it Dhannjay uphade  official website</h2>

</body>
</html>
