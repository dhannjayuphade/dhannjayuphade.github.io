<!DOCTYPE html>
<html>
<head>
  <title>Milk Dairy Pro Ultimate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PDF Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 10px;
    }

    h2 { color: #22c55e; }

    .box {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 12px;
    }

    input, select {
      padding: 10px;
      margin: 5px;
      width: 90%;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      width: 45%;
    }

    .card {
      background: #334155;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
    }

    .whatsapp {
      background: #25D366;
      width: 100%;
    }

    .pdf {
      background: #3b82f6;
      width: 100%;
    }
  </style>
  <link rel="manifest" href="manifest.json">
</head>

<body>

<h2>🥛 Milk Dairy Pro Ultimate</h2>

<div class="box">
<h3>Add Customer</h3>
<input id="cname" placeholder="Customer Name">
<input id="cmobile" placeholder="Mobile Number">
<button onclick="addCustomer()">Add</button>
</div>

<div class="box">
<h3>Milk Entry</h3>
<select id="customerSelect"></select>
<input id="milk" type="number" placeholder="Milk (L)">
<input id="rate" type="number" placeholder="Rate ₹">
<button onclick="saveData()">Save</button>
</div>

<div class="box">
<h3>Filter</h3>
<select id="monthFilter">
<option value="all">All</option>
<option value="0">Jan</option>
<option value="1">Feb</option>
<option value="2">Mar</option>
<option value="3">Apr</option>
<option value="4">May</option>
<option value="5">Jun</option>
<option value="6">Jul</option>
<option value="7">Aug</option>
<option value="8">Sep</option>
<option value="9">Oct</option>
<option value="10">Nov</option>
<option value="11">Dec</option>
</select>

<button onclick="showData()">Records</button>
<button onclick="monthlyReport()">Report</button>
<button onclick="downloadPDF()">PDF</button>
</div>

<div id="output"></div>

<script>

// Load Customers
function loadCustomers() {
  let customers = JSON.parse(localStorage.getItem("customers")) || [];
  let select = document.getElementById("customerSelect");
  select.innerHTML = "";

  customers.forEach(c => {
    let option = document.createElement("option");
    option.value = c.name + "|" + c.mobile;
    option.textContent = c.name;
    select.appendChild(option);
  });
}

// Add Customer
function addCustomer() {
  let name = document.getElementById("cname").value;
  let mobile = document.getElementById("cmobile").value;

  if (!name || !mobile) return alert("Fill all fields");

  let customers = JSON.parse(localStorage.getItem("customers")) || [];
  customers.push({ name, mobile });

  localStorage.setItem("customers", JSON.stringify(customers));
  loadCustomers();
  alert("Customer Added");
}

// Save Entry
function saveData() {
  let selected = document.getElementById("customerSelect").value;
  if (!selected) return alert("Add customer first");

  let [name, mobile] = selected.split("|");

  let milk = document.getElementById("milk").value;
  let rate = document.getElementById("rate").value;

  if (!milk || !rate) return alert("Fill all fields");

  let total = milk * rate;

  let records = JSON.parse(localStorage.getItem("milkData")) || [];

  records.push({
    name, mobile, milk, rate, total,
    date: new Date().toISOString()
  });

  localStorage.setItem("milkData", JSON.stringify(records));
  alert("Saved");
}

// Show Records
function showData() {
  let records = JSON.parse(localStorage.getItem("milkData")) || [];
  let month = document.getElementById("monthFilter").value;

  let html = "";
  let totalAll = 0;

  records.forEach(r => {
    let m = new Date(r.date).getMonth();

    if (month === "all" || month == m) {
      totalAll += r.total;

      html += `
        <div class="card">
          <b>${r.name}</b><br>
          ${r.milk}L × ₹${r.rate} = ₹${r.total}<br>
          ${new Date(r.date).toLocaleDateString()}
        </div>
      `;
    }
  });

  html += `<h3>Total ₹${totalAll}</h3>`;
  document.getElementById("output").innerHTML = html;
}

// Monthly Report
function monthlyReport() {
  let records = JSON.parse(localStorage.getItem("milkData")) || [];
  let month = document.getElementById("monthFilter").value;

  let result = {};

  records.forEach(r => {
    let m = new Date(r.date).getMonth();

    if (month === "all" || month == m) {
      if (!result[r.name]) {
        result[r.name] = { total: 0, mobile: r.mobile };
      }
      result[r.name].total += r.total;
    }
  });

  let html = "<h3>Monthly Report</h3>";

  for (let name in result) {
    html += `
      <div class="card">
        <b>${name}</b><br>
        Total: ₹${result[name].total}
        <button class="whatsapp" onclick="sendWhatsApp('${name}','${result[name].total}','${result[name].mobile}')">
        WhatsApp
        </button>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}

// WhatsApp
function sendWhatsApp(name, total, mobile) {
  let msg = `Hello ${name}, Your Milk Bill is ₹${total}`;
  let url = `https://wa.me/91${mobile}?text=${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
}

// PDF Download
async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let records = JSON.parse(localStorage.getItem("milkData")) || [];
  let month = document.getElementById("monthFilter").value;

  let result = {};

  records.forEach(r => {
    let m = new Date(r.date).getMonth();

    if (month === "all" || month == m) {
      if (!result[r.name]) result[r.name] = 0;
      result[r.name] += r.total;
    }
  });

  let y = 10;
  doc.setFontSize(16);
  doc.text("Milk Monthly Bill", 20, y);

  y += 10;

  for (let name in result) {
    doc.setFontSize(12);
    doc.text(`${name} - ₹${result[name]}`, 20, y);
    y += 10;
  }

  doc.save("Milk_Bill.pdf");
}

// Init
loadCustomers();

</script>

</body>
  </html>
