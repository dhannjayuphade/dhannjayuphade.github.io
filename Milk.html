<!DOCTYPE html>
<html>
<head>
  <title>Milk Dairy Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    .box{
      background:#1e293b;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }

    input,select{
      width:90%;
      padding:10px;
      margin:5px;
      border-radius:8px;
    }

    button{
      padding:10px;
      margin:5px;
      width:45%;
      border-radius:8px;
      border:none;
      background:#22c55e;
      color:white;
    }

    .card{
      background:#334155;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }

    .danger{background:red;width:100%;}
    .wa{background:#25D366;width:100%;}
    .pdf{background:#3b82f6;width:100%;}
  </style>
</head>

<body>

<h2>🥛 Milk Dairy Pro</h2>

<!-- CUSTOMER -->
<div class="box">
<h3>Add Customer</h3>
<input id="cname" placeholder="Name">
<input id="cmobile" placeholder="Mobile">
<input id="clocation" placeholder="Location">
<button onclick="addCustomer()">Add</button>
</div>

<!-- ENTRY -->
<div class="box">
<h3>Milk Entry</h3>
<select id="customerSelect"></select>
<input id="milk" type="number" step="0.1" placeholder="Milk (0.5)">
<input id="rate" type="number" value="40">
<button onclick="saveData()">Save</button>
</div>

<!-- FILTER -->
<div class="box">
<h3>Reports</h3>
<button onclick="showData()">Show</button>
<button onclick="monthlyReport()">Monthly</button>
<button onclick="clearAll()" class="danger">Clear All</button>
</div>

<div id="output"></div>

<script>

// LOAD CUSTOMER
function loadCustomers(){
  let c = JSON.parse(localStorage.getItem("customers")) || [];
  let sel = document.getElementById("customerSelect");
  sel.innerHTML="";

  c.forEach(x=>{
    let op = document.createElement("option");
    op.value = `${x.name}|${x.mobile}|${x.location}`;
    op.text = `${x.name} - ${x.location}`;
    sel.appendChild(op);
  });
}

// ADD CUSTOMER
function addCustomer(){
  let name = cname.value;
  let mobile = cmobile.value;
  let location = clocation.value;

  if(!name||!mobile||!location) return alert("Fill all");

  let c = JSON.parse(localStorage.getItem("customers")) || [];
  c.push({name,mobile,location});

  localStorage.setItem("customers",JSON.stringify(c));
  loadCustomers();

  cname.value="";cmobile.value="";clocation.value="";
  alert("Added");
}

// SAVE DATA (FIXED DECIMAL)
function saveData(){
  let val = customerSelect.value;
  if(!val) return alert("Select customer");

  let [name,mobile,location] = val.split("|");

  let milk = parseFloat(document.getElementById("milk").value);
  let rate = parseFloat(document.getElementById("rate").value);

  if(isNaN(milk)||isNaN(rate)) return alert("Invalid");

  let total = milk * rate;

  let data = JSON.parse(localStorage.getItem("milkData")) || [];

  data.push({
    name,mobile,location,milk,rate,total,
    date:new Date().toISOString()
  });

  localStorage.setItem("milkData",JSON.stringify(data));

  alert("Saved");
  document.getElementById("milk").value="";
}

// SHOW DATA
function showData(){
  let data = JSON.parse(localStorage.getItem("milkData")) || [];
  let html="", total=0;

  data.forEach(r=>{
    total += r.total;
    html += `<div class="card">
      <b>${r.name}</b><br>
      ${r.milk}L × ₹${r.rate} = ₹${r.total}<br>
      ${new Date(r.date).toLocaleDateString()}
    </div>`;
  });

  html += `<h3>Total ₹${total}</h3>`;
  output.innerHTML = html;
}

// MONTHLY REPORT
function monthlyReport(){
  let data = JSON.parse(localStorage.getItem("milkData")) || [];
  let res={};

  data.forEach(r=>{
    if(!res[r.name]) res[r.name]={total:0,mobile:r.mobile,location:r.location};
    res[r.name].total += r.total;
  });

  let html="<h3>Monthly Report</h3>";

  for(let name in res){
    html += `<div class="card">
      <b>${name}</b><br>
      ₹${res[name].total}<br>
      📍 ${res[name].location}

      <button class="wa" onclick="sendWA('${name}','${res[name].total}','${res[name].mobile}','${res[name].location}')">WhatsApp</button>

      <button class="pdf" onclick="pdf('${name}')">PDF</button>

      <button onclick="sms('${name}','${res[name].total}')">SMS</button>

      <button class="danger" onclick="del('${name}')">Delete</button>
    </div>`;
  }

  output.innerHTML = html;
}

// WHATSAPP
function sendWA(name,total,mobile,loc){
let msg=`*Milk Dairy 🥛*

${name}
Total: ₹${total}
Location: ${loc}

https://dhannjayuphade.github.io/`;

window.open(`https://wa.me/91${mobile}?text=${encodeURIComponent(msg)}`);
}

// PDF CLEAN
function pdf(name){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();

  let data=JSON.parse(localStorage.getItem("milkData"))||[];
  let y=45,total=0;

  let loc="";

  data.forEach(r=>{
    if(r.name==name) loc=r.location;
  });

  doc.setFontSize(16);
  doc.text("Milk Dairy",20,10);

  doc.setFontSize(10);
  doc.text("Website: dhannjayuphade.github.io",20,15);

  doc.text("Customer: "+name,20,25);
  doc.text("Location: "+loc,20,32);

  doc.text("Date  Milk  ₹",20,40);

  data.forEach(r=>{
    if(r.name==name){
      let d=new Date(r.date).toLocaleDateString();
      doc.text(`${d}  ${r.milk}L  ₹${r.total}`,20,y);
      total+=r.total;
      y+=8;
    }
  });

  doc.text("Total: ₹"+total,20,y+10);
  doc.text("Signature",140,y+30);

  doc.save(name+"_bill.pdf");
}

// SMS
function sms(name,total){
let msg=`Milk Dairy
${name}
Total ₹${total}`;
window.open(`sms:?body=${encodeURIComponent(msg)}`);
}

// DELETE
function del(name){
let c=JSON.parse(localStorage.getItem("customers"))||[];
let d=JSON.parse(localStorage.getItem("milkData"))||[];

c=c.filter(x=>x.name!=name);
d=d.filter(x=>x.name!=name);

localStorage.setItem("customers",JSON.stringify(c));
localStorage.setItem("milkData",JSON.stringify(d));

loadCustomers();
monthlyReport();
}

// CLEAR ALL
function clearAll(){
if(confirm("Delete all?")){
localStorage.clear();
location.reload();
}
}

loadCustomers();

</script>

</body>
  </html>
