<!DOCTYPE html>
<html>
<head>
<title>Milk Dairy ERP PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:10px;margin:10px;border-radius:10px;}
input,select{width:90%;padding:10px;margin:5px;border-radius:8px;}
button{padding:10px;margin:5px;border:none;border-radius:8px;width:45%;}
.card{background:#334155;margin:10px;padding:10px;border-radius:10px;cursor:pointer;}
.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.red{background:red;color:white;}
.wa{background:#25D366;color:white;width:100%;}
</style>
</head>

<body>

<h2>🥛 Milk Dairy ERP PRO MAX</h2>

<!-- CUSTOMER -->
<div class="box">
<h3>Add / Edit Customer</h3>
<input id="cname" placeholder="Name">
<input id="cmobile" placeholder="Mobile">
<input id="cplace" placeholder="Place">

<button class="green" onclick="addCustomer()">Add</button>
<button class="blue" onclick="updateCustomer()">Update</button>
</div>

<!-- MILK ENTRY -->
<div class="box">
<h3>Milk Entry</h3>
<select id="customerSelect"></select>
<input id="milk" type="number" placeholder="Milk (L)">
<input id="rate" type="number" value="40">

<button class="green" onclick="saveMilk()">Save</button>
<button class="blue" onclick="loadCustomers()">Refresh</button>
</div>

<!-- OUTPUT -->
<div id="output"></div>

<script>

function get(k){ return JSON.parse(localStorage.getItem(k)) || []; }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

// LOAD CUSTOMERS LIST
function loadCustomers(){
  let c = get("customers");
  customerSelect.innerHTML="";

  c.forEach(x=>{
    let op=document.createElement("option");
    op.value=x.id;
    op.text=x.name+" - "+x.place;
    customerSelect.appendChild(op);
  });

  showCustomers();
}

// SHOW CUSTOMER CARDS
function showCustomers(){
  let c = get("customers");

  let html="<h3>Customers</h3>";

  c.forEach(x=>{
    html+=`
    <div class="card" onclick="openCustomer('${x.id}')">
      <b>${x.name}</b><br>
      📱 ${x.mobile}<br>
      📍 ${x.place}
    </div>`;
  });

  output.innerHTML=html;
}

// ADD CUSTOMER
function addCustomer(){
  let c=get("customers");

  c.push({
    id:crypto.randomUUID(),
    name:cname.value,
    mobile:cmobile.value,
    place:cplace.value
  });

  save("customers",c);
  loadCustomers();

  cname.value="";cmobile.value="";cplace.value="";
}

// UPDATE CUSTOMER
function updateCustomer(){
  let id=localStorage.getItem("editId");
  let c=get("customers");

  c=c.map(x=>{
    if(x.id==id){
      x.name=cname.value;
      x.mobile=cmobile.value;
      x.place=cplace.value;
    }
    return x;
  });

  save("customers",c);
  loadCustomers();
}

// SAVE MILK
function saveMilk(){
  let data=get("milkData");

  data.push({
    id:crypto.randomUUID(),
    customerId:customerSelect.value,
    milk:parseFloat(milk.value),
    rate:parseFloat(rate.value),
    total:milk.value*rate.value,
    date:new Date().toISOString(),
    status:"UNPAID"
  });

  save("milkData",data);
  alert("Saved");
}

// OPEN CUSTOMER DETAIL
function openCustomer(id){
  let c=get("customers").find(x=>x.id==id);
  let data=get("milkData");

  let total=0;
  let html=`
  <div class="box">
    <h3>${c.name}</h3>
    📱 ${c.mobile}<br>
    📍 ${c.place}<br>
<button class="wa" onclick="sendWhatsApp('${c.id}')">
  WhatsApp
</button>

<button class="blue" onclick="sendSMS('${c.id}')">
  SMS
</button>
    <button class="blue" onclick="editCustomer('${c.id}')">Edit</button>
  </div>

  <h3>History</h3>
  `;

  data.forEach(r=>{
    if(r.customerId==id){
      total+=r.total;

      html+=`
      <div class="card">
        📅 ${new Date(r.date).toLocaleDateString()}<br>
        🥛 ${r.milk}L × ₹${r.rate} = ₹${r.total}<br>
        Status: ${r.status}

        <button onclick="togglePaid('${r.id}')">Toggle Paid</button>
      </div>`;
    }
  });

  html+=`<h3>Total: ₹${total}</h3>`;

  output.innerHTML=html;
}

// EDIT CUSTOMER
function editCustomer(id){
  let c=get("customers").find(x=>x.id==id);

  cname.value=c.name;
  cmobile.value=c.mobile;
  cplace.value=c.place;

  localStorage.setItem("editId",id);
}
  function sendWhatsApp(id){
  let customers = get("customers");
  let data = get("milkData");

  let c = customers.find(x => x.id == id);
  let entries = data.filter(x => x.customerId == id);

  let total = 0;
  let msg = `🥛 your Milk Bill\n\n`;

  msg += `Name: ${c.name}\n`;
  msg += `Mobile: ${c.mobile}\n`;
  msg += `Place: ${c.place}\n\n`;

  msg += `----------------------\n`;

  entries.forEach(r=>{
    total += r.total;

    let d = new Date(r.date);
    msg += `${d.toLocaleDateString()} : ${r.milk}L × ₹${r.rate} = ₹${r.total}\n`;
  });

  msg += `----------------------\n`;
    msg += `TOTAL: ${total}\n`;
    msg += `TOTAL: ₹${total}\n`;

  window.open(`https://wa.me/91${c.mobile}?text=${encodeURIComponent(msg)}`);
      }
  function sendSMS(id){
  let customers = get("customers");
  let data = get("milkData");

  let c = customers.find(x => x.id == id);
  let entries = data.filter(x => x.customerId == id);

  let total = 0;

  let msg = `your Milk Bill\n\n`;

  msg += `Name: ${c.name}\n`;
  msg += `Mobile: ${c.mobile}\n`;
  msg += `Place: ${c.place}\n\n`;

  msg += `------------------\n`;

  entries.forEach(r=>{
    total += r.total;

    let d = new Date(r.date);
    let day = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];

    msg += `${d.toLocaleDateString()} (${day})\n`;
    msg += `${r.milk}L × ₹${r.rate} = ₹${r.total}\n\n`;
  });

  msg += `------------------\n`;
  msg += `TOTAL: ₹${total}\n`;

  // SMS open
  window.open(`sms:${c.mobile}?body=${encodeURIComponent(msg)}`);
              }

// TOGGLE PAID
function togglePaid(id){
  let data=get("milkData");

  data=data.map(r=>{
    if(r.id==id){
      r.status=r.status==="PAID"?"UNPAID":"PAID";
    }
    return r;
  });

  save("milkData",data);
}

// INIT
loadCustomers();

</script>

</body>
  </html>
