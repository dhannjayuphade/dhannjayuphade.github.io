<!DOCTYPE html>
<html>
<head>
  <title>Milk Dairy Pro Ultimate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color: white;
      text-align: center;
      padding: 10px;
    }
    h2 { color:#22c55e; }

    .box {
      background:#1e293b;
      padding:15px;
      margin:10px;
      border-radius:12px;
    }

    input,select {
      padding:10px;
      margin:5px;
      width:90%;
      border-radius:8px;
      border:none;
    }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      width:45%;
    }

    .card {
      background:#334155;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }

    .danger { background:red; width:100%; }
    .whatsapp { background:#25D366; width:100%; }
    .pdf { background:#3b82f6; width:100%; }
  </style>
</head>

<body>

<h2>🥛 Dhananjay Milk Dairy</h2>

<!-- Customer -->
<div class="box">
<h3>Add Customer</h3>
<input id="cname" placeholder="Customer Name">
<input id="cmobile" placeholder="Mobile Number">
<button onclick="addCustomer()">Add</button>
</div>

<!-- Entry -->
<div class="box">
<h3>Milk Entry</h3>
<select id="customerSelect"></select>
<input id="milk" type="number" step="0.1" placeholder="Milk (0.5)">
<input id="rate" type="number" value="40" placeholder="Rate ₹">
<button onclick="saveData()">Save</button>
</div>

<!-- Filter -->
<div class="box">
<h3>Filter</h3>
<select id="monthFilter">
<option value="all">All</option>
<option value="0">Jan</option><option value="1">Feb</option>
<option value="2">Mar</option><option value="3">Apr</option>
<option value="4">May</option><option value="5">Jun</option>
<option value="6">Jul</option><option value="7">Aug</option>
<option value="8">Sep</option><option value="9">Oct</option>
<option value="10">Nov</option><option value="11">Dec</option>
</select>

<button onclick="showData()">Records</button>
<button onclick="monthlyReport()">Report</button>
<button onclick="clearAll()">Clear</button>
</div>

<div id="output"></div>

<script>

// Load Customers
function loadCustomers(){
  let customers = JSON.parse(localStorage.getItem("customers")) || [];
  customerSelect.innerHTML="";
  customers.forEach(c=>{
    customerSelect.innerHTML+=`<option value="${c.name}|${c.mobile}">${c.name}</option>`;
  });
}

// Add Customer
function addCustomer(){
  let name=cname.value, mobile=cmobile.value;
  if(!name||!mobile) return alert("Fill all");

  let customers=JSON.parse(localStorage.getItem("customers"))||[];
  customers.push({name,mobile});
  localStorage.setItem("customers",JSON.stringify(customers));

  loadCustomers();
  alert("Added");
}

// Save Entry
function saveData(){
  let [name,mobile]=customerSelect.value.split("|");
  let milk=milkInput.value, rate=rateInput.value;

  if(!milk||!rate) return alert("Fill");

  let total=milk*rate;

  let data=JSON.parse(localStorage.getItem("milkData"))||[];
  data.push({name,mobile,milk,rate,total,date:new Date().toISOString()});
  localStorage.setItem("milkData",JSON.stringify(data));

  alert("Saved");
}

// Show Records
function showData(){
  let data=JSON.parse(localStorage.getItem("milkData"))||[];
  let month=monthFilter.value;
  let html="",total=0;

  data.forEach(r=>{
    let m=new Date(r.date).getMonth();
    if(month=="all"||month==m){
      total+=r.total;
      html+=`<div class="card">${r.name}<br>${r.milk}L = ₹${r.total}</div>`;
    }
  });

  html+=`<h3>Total ₹${total}</h3>`;
  output.innerHTML=html;
}

// Monthly Report
function monthlyReport(){
  let data=JSON.parse(localStorage.getItem("milkData"))||[];
  let month=monthFilter.value;
  let result={};

  data.forEach(r=>{
    let m=new Date(r.date).getMonth();
    if(month=="all"||month==m){
      if(!result[r.name]) result[r.name]={total:0,mobile:r.mobile};
      result[r.name].total+=r.total;
    }
  });

  let html="<h3>Report</h3>";

  for(let name in result){
    html+=`
    <div class="card">
      <b>${name}</b><br>
      ₹${result[name].total}

      <button class="whatsapp" onclick="sendWhatsApp('${name}','${result[name].total}','${result[name].mobile}')">WhatsApp</button>

      <button class="pdf" onclick="generatePDF('${name}')">PDF</button>

      <button onclick="copySMS('${name}','${result[name].total}')">SMS</button>

      <button class="danger" onclick="deleteCustomer('${name}')">Delete</button>
    </div>`;
  }

  output.innerHTML=html;
}

// WhatsApp
function sendWhatsApp(name,total,mobile){
let msg=`*Dhananjay Milk Dairy 🥛*

Hello ${name}
Your Bill: ₹${total}

Website:
https://dhannjayuphade.github.io/
Mo: 8975881499`;

window.open(`https://wa.me/91${mobile}?text=${encodeURIComponent(msg)}`);
}

// PDF
function generatePDF(name){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();

  let data=JSON.parse(localStorage.getItem("milkData"))||[];
  let y=20,total=0;

  doc.setFontSize(16);
  doc.text("Dhananjay Milk Dairy",20,10);

  doc.setFontSize(10);
  doc.text("Website: dhannjayuphade.github.io",20,15);
  doc.text("Mo: 8975881499",20,20);

  doc.text("Customer: "+name,20,30);

  y=40;

  doc.text("Date",20,y);
  doc.text("Milk",80,y);
  doc.text("₹",140,y);

  y+=5;
  doc.line(20,y,180,y);
  y+=5;

  data.forEach(r=>{
    if(r.name==name){
      let d=new Date(r.date).toLocaleDateString();
      doc.text(d,20,y);
      doc.text(r.milk.toString(),80,y);
      doc.text("₹"+r.total,140,y);
      total+=r.total;
      y+=8;
    }
  });

  y+=10;
  doc.text("Total ₹"+total,20,y);

  y+=20;
  doc.text("Signature",140,y);

  doc.save(name+"_bill.pdf");
}

// SMS
function copySMS(name,total){
let msg=`Dhananjay Milk Dairy
${name} - ₹${total}
Mo:8975881499`;
navigator.clipboard.writeText(msg);
alert("SMS Copied");
}

// Delete Customer
function deleteCustomer(name){
let customers=JSON.parse(localStorage.getItem("customers"))||[];
let data=JSON.parse(localStorage.getItem("milkData"))||[];

customers=customers.filter(c=>c.name!=name);
data=data.filter(d=>d.name!=name);

localStorage.setItem("customers",JSON.stringify(customers));
localStorage.setItem("milkData",JSON.stringify(data));

loadCustomers();
monthlyReport();
}

// Clear All
function clearAll(){
if(confirm("Delete all data?")){
localStorage.clear();
location.reload();
}
}

// Init
loadCustomers();

</script>

</body>
  </html>
