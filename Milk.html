<!DOCTYPE html>
<html>
<head>
<title>Dhananjay Milk Dairy ULTIMATE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;margin:10px;padding:10px;border-radius:10px;}
input,select{width:90%;padding:10px;margin:5px;border-radius:8px;}
button{padding:10px;margin:5px;border:none;border-radius:8px;width:45%;}
.card{background:#334155;margin:10px;padding:10px;border-radius:10px;}
.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.red{background:red;color:white;}
.wa{background:#25D366;color:white;width:100%;}
</style>
</head>

<body>

<h2>🥛 Dhananjay Milk Dairy ULTIMATE</h2>

<!-- CUSTOMER -->
<div class="box">
<h3>Add / Edit Customer</h3>
<input id="cname" placeholder="Name">
<input id="cmobile" placeholder="Mobile">
<input id="cplace" placeholder="Place">

<button class="green" onclick="addCustomer()">Add</button>
<button class="blue" onclick="updateCustomer()">Update</button>
</div>

<!-- ENTRY -->
<div class="box">
<h3>Milk Entry</h3>
<select id="customerSelect"></select>
<input id="milk" type="number" step="0.1" placeholder="Milk (L)">
<input id="rate" type="number" value="40">

<button class="green" onclick="saveMilk()">Save</button>
<button class="blue" onclick="loadCustomers()">Refresh</button>
</div>

<div id="output"></div>

<script>

// STORAGE
function get(k){ return JSON.parse(localStorage.getItem(k)) || []; }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

// LOAD
function loadCustomers(){
  let customers=get("customers");
  customerSelect.innerHTML="<option value=''>Select Customer</option>";

  customers.forEach(c=>{
    customerSelect.innerHTML+=`<option value="${c.id}">${c.name}</option>`;
  });

  showCustomers();
}

// SHOW LIST
function showCustomers(){
  let customers=get("customers");
  let html="<h3>Customers</h3>";

  customers.forEach(c=>{
    html+=`
    <div class="card" onclick="openCustomer('${c.id}')">
      <b>${c.name}</b><br>
      📱 ${c.mobile}<br>
      📍 ${c.place}
    </div>`;
  });

  output.innerHTML=html;
}

// ADD CUSTOMER
function addCustomer(){
  if(!cname.value || !cmobile.value) return alert("Fill all");

  let customers=get("customers");

  customers.push({
    id:crypto.randomUUID(),
    name:cname.value,
    mobile:cmobile.value,
    place:cplace.value
  });

  save("customers",customers);
  loadCustomers();

  cname.value=""; cmobile.value=""; cplace.value="";
}

// UPDATE CUSTOMER
function updateCustomer(){
  let id=localStorage.getItem("editId");
  if(!id) return alert("Select customer first");

  let customers=get("customers");

  customers=customers.map(c=>{
    if(c.id==id){
      c.name=cname.value;
      c.mobile=cmobile.value;
      c.place=cplace.value;
    }
    return c;
  });

  save("customers",customers);
  loadCustomers();
}

// SAVE MILK
function saveMilk(){
  let id=customerSelect.value;
  if(!id) return alert("Select customer");

  let milkVal=parseFloat(milk.value);
  let rateVal=parseFloat(rate.value);

  if(isNaN(milkVal)||isNaN(rateVal)) return alert("Invalid");

  let data=get("milkData");

  data.push({
    id:crypto.randomUUID(),
    customerId:id,
    milk:milkVal,
    rate:rateVal,
    total:milkVal*rateVal,
    date:new Date().toISOString(),
    status:"UNPAID"
  });

  save("milkData",data);
  alert("Saved");
}

// OPEN CUSTOMER
function openCustomer(id){
  let c=get("customers").find(x=>x.id==id);
  if(!c) return alert("Customer not found");

  let data=get("milkData");

  let total=0;
  let html=`
  <div class="box">
    <h3>${c.name}</h3>
    📱 ${c.mobile}<br>
    📍 ${c.place}<br>

    <button class="blue" onclick="editCustomer('${c.id}')">Edit</button>
    <button class="wa" onclick="sendWhatsApp('${c.id}')">WhatsApp</button>
    <button class="blue" onclick="sendSMS('${c.id}')">SMS</button>
    <button class="blue" onclick="generatePDF('${c.id}')">PDF</button>
    <button class="red" onclick="deleteCustomer('${c.id}')">Delete Customer</button>
    <button class="red" onclick="clearMilkData('${c.id}')">Clear Milk Data</button>
  </div>

  <h3>History</h3>
  `;

  data.forEach(r=>{
    if(r.customerId==id){
      total+=r.total;

      html+=`
      <div class="card">
        📅 ${new Date(r.date).toLocaleDateString()}<br>
        🥛 ${r.milk}L × ₹${r.rate} = ₹${r.total}<br>
        Status: ${r.status}
        <button onclick="togglePaid('${r.id}','${id}')">Toggle Paid</button>
      </div>`;
    }
  });

  html+=`<h3>Total: ₹${total}</h3>`;
  output.innerHTML=html;
}

// EDIT
function editCustomer(id){
  let c=get("customers").find(x=>x.id==id);

  cname.value=c.name;
  cmobile.value=c.mobile;
  cplace.value=c.place;

  localStorage.setItem("editId",id);
}

// TOGGLE PAID
function togglePaid(entryId,custId){
  let data=get("milkData");

  data=data.map(r=>{
    if(r.id==entryId){
      r.status=r.status==="PAID"?"UNPAID":"PAID";
    }
    return r;
  });

  save("milkData",data);
  openCustomer(custId);
}

// DELETE CUSTOMER
function deleteCustomer(id){
  if(!confirm("Delete full customer?")) return;

  let customers=get("customers");
  let data=get("milkData");

  customers=customers.filter(c=>c.id!=id);
  data=data.filter(d=>d.customerId!=id);

  save("customers",customers);
  save("milkData",data);

  loadCustomers();
}

// CLEAR MILK DATA
function clearMilkData(id){
  if(!confirm("Clear milk data?")) return;

  let data=get("milkData");
  data=data.filter(d=>d.customerId!=id);

  save("milkData",data);
  openCustomer(id);
}

// WHATSAPP FULL BILL
function sendWhatsApp(id){
  let c=get("customers").find(x=>x.id==id);
  let data=get("milkData").filter(x=>x.customerId==id);

  let total=0;
  let msg=`🥛your Milk bill\n\nName: ${c.name}\n\n`;

  msg+=`Date | Ltr | Rate | ₹\n`;
  msg+=`----------------------\n`;

  data.forEach(r=>{
    total+=r.total;
    let d=new Date(r.date).toLocaleDateString();
    msg+=`${d} | ${r.milk}L | ₹${r.rate} | ₹${r.total}\n`;
  });

  msg+=`----------------------\nTotal: ₹${total}`;

  window.open(`https://wa.me/91${c.mobile}?text=${encodeURIComponent(msg)}`);
}

// SMS
function sendSMS(id){
  let c=get("customers").find(x=>x.id==id);
  let data=get("milkData").filter(x=>x.customerId==id);

let total=0;
  let msg=`🥛your Milk bill\n\nName: ${c.name}\n\n`;

  msg+=`Date | Ltr | Rate | ₹\n`;
  msg+=`----------------------\n`;

  data.forEach(r=>{
    total+=r.total;
    let d=new Date(r.date).toLocaleDateString();
    msg+=`${d} | ${r.milk}L | ₹${r.rate} | ₹${r.total}\n`;
  });

  msg+=`----------------------\nTotal: ₹${total}`;

  window.open(`sms:${c.mobile}?body=${encodeURIComponent(msg)}`);
}

// PDF
function generatePDF(id){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();

  let c=get("customers").find(x=>x.id==id);
  let data=get("milkData").filter(x=>x.customerId==id);

  let y=40,total=0;

  doc.text("Dhananjay Milk Dairy",20,15);
  doc.text("Customer: "+c.name,20,25);

  doc.text("Date",20,40);
  doc.text("Milk",70,40);
  doc.text("Rate",110,40);
  doc.text("Total",150,40);

  y=45;
  data.forEach(r=>{
    let d=new Date(r.date).toLocaleDateString();

    doc.text(d,20,y);
    doc.text(r.milk+"L",70,y);
    doc.text("₹"+r.rate,110,y);
    doc.text("₹"+r.total,150,y);

    total+=r.total;
    y+=8;
  });

  doc.text("Total: ₹"+total,20,y+10);
  doc.save(c.name+"_bill.pdf");
}

// INIT
loadCustomers();

</script>

</body>
  </html>
