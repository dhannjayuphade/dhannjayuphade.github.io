<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify Certificate</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}
.box{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}
</style>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* GET ID FROM URL */
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

/* LOAD DATA */
async function loadCertificate(){

if(!id){
document.getElementById("result").innerText="❌ Invalid Link";
return;
}

let snap = await get(ref(db,"certificates/"+id));

if(!snap.exists()){
document.getElementById("result").innerText="❌ Certificate Not Found";
return;
}

let data = snap.val();

/* SHOW DATA */
document.getElementById("result").innerHTML = `
<div class="box">
<h2>✅ Certificate Verified</h2>
<p><b>Name:</b> ${data.name}</p>
<p><b>Score:</b> ${data.score}</p>
<p><b>Quiz:</b> ${data.topic}</p>
<p><b>Date:</b> ${data.date}</p>
<p><b>ID:</b> ${id}</p>
</div>
`;

}

window.onload = loadCertificate;

</script>

</head>

<body>

<h1>🎓 Certificate Verification</h1>

<div id="result">Checking...</div>

</body>
</html>
