<!DOCTYPE html>
<html>
<head>
<title>Ultimate Racing Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  text-align:center;
}

canvas{
  display:block;
  margin:auto;
  border-radius:15px;
  background:#111;
}

.btn{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}

#shop,#garage{
  display:none;
  background:#000a;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>🏎️ Ultimate Racing</h2>

<div id="score">Score:0</div>
<div id="coinsBox">💰 0</div>
<div id="best">🏆 Best:0</div>
<div id="missionBox">🎯 Mission: Loading...</div>

<canvas id="game" width="400" height="600"></canvas>

<div>
<button class="btn" onclick="left()">⬅️</button>
<button class="btn" onclick="right()">➡️</button>
<button class="btn" onclick="nitroOn()">🔥</button>
<button class="btn" onclick="toggleShop()">🛒</button>
<button class="btn" onclick="toggleGarage()">🚗</button>
</div>

<!-- SHOP -->
<div id="shop">
<h3>Shop</h3>
<button onclick="buy('red',0)">Red</button>
<button onclick="buy('blue',50)">Blue</button>
<button onclick="buy('gold',100)">Gold</button>
</div>

<!-- GARAGE -->
<div id="garage">
<h3>Garage</h3>
<img id="preview" src="car.png" width="120"><br>
<button onclick="prevCar()">⬅️</button>
<button onclick="nextCar()">➡️</button>
<button onclick="selectCar()">Select</button>
</div>

<audio id="engine" src="engine.mp3" loop></audio>
<audio id="crash" src="crash.mp3"></audio>

<script>
let c=document.getElementById("game");
let ctx=c.getContext("2d");

// cars
let cars={red:"car.png",blue:"car2.png",gold:"car3.png"};
let img=new Image();
let enemy=new Image();
enemy.src="enemy.png";

// storage
let coins=parseInt(localStorage.getItem("coins"))||0;
let best=parseInt(localStorage.getItem("best"))||0;
let owned=JSON.parse(localStorage.getItem("owned"))||["red"];
let selected=localStorage.getItem("selected")||"red";

img.src=cars[selected];

// mission
let missions=[
 {text:"Score 10",target:10,reward:20},
 {text:"Score 30",target:30,reward:50},
 {text:"Coins 200",coinTarget:200,reward:100}
];
let mIndex=parseInt(localStorage.getItem("mIndex"))||0;
let currentMission=missions[mIndex];

// game
let lanes=[40,175,310];
let carX=lanes[1],carY=500;
let obs=[];
let score=0;
let nitro=false;
let day=true;

// rain
let rain=[];
for(let i=0;i<80;i++){
 rain.push({x:Math.random()*400,y:Math.random()*600});
}

// controls
function left(){
 let i=lanes.indexOf(carX);
 if(i>0) carX=lanes[i-1];
}
function right(){
 let i=lanes.indexOf(carX);
 if(i<lanes.length-1) carX=lanes[i+1];
}

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") left();
 if(e.key==="ArrowRight") right();
});

// nitro
function nitroOn(){
 nitro=true;
 setTimeout(()=>nitro=false,2000);
}

// shop
function toggleShop(){
 shop.style.display=shop.style.display==="none"?"block":"none";
}
function buy(name,price){
 if(owned.includes(name)){
   selected=name;
 }else if(coins>=price){
   coins-=price;
   owned.push(name);
   selected=name;
 }
 localStorage.setItem("owned",JSON.stringify(owned));
 localStorage.setItem("coins",coins);
 localStorage.setItem("selected",selected);
 img.src=cars[selected];
}

// garage
let gCars=["car.png","car2.png","car3.png"];
let gIndex=0;

function toggleGarage(){
 garage.style.display=garage.style.display==="none"?"block":"none";
}
function prevCar(){gIndex=(gIndex-1+gCars.length)%gCars.length;updatePreview();}
function nextCar(){gIndex=(gIndex+1)%gCars.length;updatePreview();}
function updatePreview(){preview.src=gCars[gIndex];}
function selectCar(){
 img.src=gCars[gIndex];
}

// spawn
setInterval(()=>{
 let x=lanes[Math.floor(Math.random()*3)];
 obs.push({x:x,y:-100});
},1200);

// mission check
function checkMission(){
 if(currentMission.target && score>=currentMission.target) completeMission();
 if(currentMission.coinTarget && coins>=currentMission.coinTarget) completeMission();
}

function completeMission(){
 coins+=currentMission.reward;
 alert("Mission Done! +" + currentMission.reward);

 mIndex++;
 if(mIndex>=missions.length) mIndex=0;

 localStorage.setItem("mIndex",mIndex);
 localStorage.setItem("coins",coins);

 currentMission=missions[mIndex];
}

// update
function update(){
 let speed=nitro?10:4+score*0.1;

 if(score%20==0) day=!day;

 rain.forEach(r=>{
  r.y+=5;
  if(r.y>600){r.y=0;r.x=Math.random()*400;}
 });

 for(let i=0;i<obs.length;i++){
  obs[i].y+=speed;

  if(
   carX<obs[i].x+45 &&
   carX+45>obs[i].x &&
   carY<obs[i].y+80 &&
   carY+80>obs[i].y
  ){
   document.getElementById("crash").play();
   if(score>best){best=score;localStorage.setItem("best",best);}
   location.reload();
  }

  if(obs[i].y>600){
   obs.splice(i,1);
   score++;
   coins+=5;
  }
 }

 checkMission();

 document.getElementById("score").innerText="Score:"+score;
 document.getElementById("coinsBox").innerText="💰 "+coins;
 document.getElementById("best").innerText="🏆 "+best;

 if(currentMission.target){
   missionBox.innerText="🎯 "+currentMission.text+" ("+score+"/"+currentMission.target+")";
 }else{
   missionBox.innerText="🎯 "+currentMission.text+" ("+coins+"/"+currentMission.coinTarget+")";
 }
}

// draw
function draw(){
 ctx.clearRect(0,0,400,600);

 ctx.fillStyle=day?"#111":"#000022";
 ctx.fillRect(0,0,400,600);

 ctx.fillStyle="white";
 for(let i=0;i<600;i+=40){
  ctx.fillRect(195,i+(Date.now()/10%40),10,20);
 }

 ctx.strokeStyle="rgba(173,216,230,0.5)";
 rain.forEach(r=>{
  ctx.beginPath();
  ctx.moveTo(r.x,r.y);
  ctx.lineTo(r.x,r.y+10);
  ctx.stroke();
 });

 ctx.drawImage(img,carX,carY,45,80);

 obs.forEach(o=>{
  ctx.drawImage(enemy,o.x,o.y,45,80);
 });

 if(nitro){
  ctx.fillStyle="orange";
  ctx.fillRect(carX+15,carY+80,15,10);
 }
}

// loop
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

// sound
document.body.addEventListener("click",()=>{
 document.getElementById("engine").play();
},{once:true});
</script>
<footer>make in Dhannjay uphade 🇮🇳 </footer>
</body>
  </html>
