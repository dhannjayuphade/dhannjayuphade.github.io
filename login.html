<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dhannjay Website</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#222;
color:white;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

/* LOGIN CARD */

#loginBox{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
}

.card{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
width:320px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.google-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
font-size:16px;
background:white;
}

/* PROFILE MENU */

#profileMenu{
position:absolute;
top:60px;
right:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:none;
}

#profileMenu button{
background:red;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">

<h3>Dhannjay Website</h3>

<img id="avatar" class="avatar" style="display:none">

</div>


<!-- LOGIN -->

<div id="loginBox">

<div class="card">

<h2>Login</h2>

<button class="google-btn" onclick="login()">

<img width="20"
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Sign in with Google

</button>

</div>

</div>


<!-- PROFILE MENU -->

<div id="profileMenu">

<p id="username"></p>

<button onclick="logout()">Logout</button>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithRedirect,
getRedirectResult,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain: "dhannjay-website.firebaseapp.com",
projectId: "dhannjay-website",
storageBucket: "dhannjay-website.firebasestorage.app",
messagingSenderId: "73314948186",
appId: "1:73314948186:web:e7d64f04ba3221a21df463"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();


window.login=function(){

signInWithRedirect(auth,provider);

}


getRedirectResult(auth).then((result)=>{

if(result){

showUser(result.user);

}

});


onAuthStateChanged(auth,(user)=>{

if(user){

showUser(user);

}

});


function showUser(user){

document.getElementById("loginBox").style.display="none";

document.getElementById("avatar").style.display="block";

document.getElementById("avatar").src=user.photoURL;

document.getElementById("username").innerText=user.displayName;

}


window.logout=function(){

signOut(auth);

location.reload();

}


/* avatar menu */

document.getElementById("avatar").onclick=function(){

const menu=document.getElementById("profileMenu");

menu.style.display=
menu.style.display==="block" ? "none":"block";

}

</script>

</body>
</html>
