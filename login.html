<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body>

<h2>Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  projectId: "dhannjay-website",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
  .then(() => msg.innerText = "Signup success")
  .catch(err => msg.innerText = err.message);
};

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
  .then(() => location.href = "profile.html")
  .catch(err => msg.innerText = err.message);
};

</script>

</body>
</html>
