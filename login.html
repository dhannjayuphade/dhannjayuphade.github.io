<!DOCTYPE html>
<html>
<head>
<title>Login System</title>
</head>
<body>

<h2>User Login</h2>

<button id="login">Login with Google</button>
<button id="logout">Logout</button>

<h3 id="user"></h3>
<img id="photo" width="80">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "dhannjay-website.firebaseapp.com",

projectId: "dhannjay-website",

storageBucket: "dhannjay-website.appspot.com",

messagingSenderId: "73314948186",

appId: "YOUR_APP_ID"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();



document.getElementById("login").onclick = function(){

signInWithPopup(auth, provider)

.then((result)=>{

const user = result.user;

document.getElementById("user").innerText = user.displayName;

document.getElementById("photo").src = user.photoURL;

});

};



document.getElementById("logout").onclick = function(){

signOut(auth);

};



onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("user").innerText = user.displayName;

document.getElementById("photo").src = user.photoURL;

}else{

document.getElementById("user").innerText = "Not logged in";

}

});


</script>

</body>
</html>
