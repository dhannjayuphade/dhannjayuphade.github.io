<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Dhannjay Website</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.card{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
background:#4285F4;
color:white;
width:100%;
}

</style>

</head>

<body>

<div class="card">

<h2>Dhannjay Website</h2>

<button onclick="login()">Login with Google</button>

</div>


<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithRedirect,
getRedirectResult
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain: "dhannjay-website.firebaseapp.com",
projectId: "dhannjay-website",
storageBucket: "dhannjay-website.firebasestorage.app",
messagingSenderId: "73314948186",
appId: "1:73314948186:web:e7d64f04ba3221a21df463"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();


window.login=function(){

signInWithRedirect(auth,provider);

}


getRedirectResult(auth)
.then((result)=>{

if(result && result.user){

window.location.href="index.html";

}

})
.catch((error)=>{

console.log(error);

});

</script>

</body>
</html>
