<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

.app{max-width:420px;margin:auto;padding:10px}

.card{
background:#1e293b;
margin:10px;
padding:15px;
border-radius:12px;
}

img{
border-radius:50%;
border:3px solid #00ffcc;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#00ffcc;
}

h2{margin:5px}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login Required</h3>
<button onclick="login()">Login with Google</button>
</div>

<!-- PROFILE -->
<div id="profileBox" style="display:none;">

<div class="card">
<img id="photo" width="90"><br><br>
<h2 id="name"></h2>
<p id="email"></p>
<p id="verifyStatus"></p>
</div>

<div class="card">
<p>Total Score: <span id="total">0</span></p>
<p>Quizzes Played: <span id="count">0</span></p>
<p>🏆 Rank: <span id="rank">-</span></p>
</div>

<div class="card">
<h3>🏅 Badges</h3>
<div id="badges"></div>
</div>

<div class="card">
<h3>📈 Graph</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<button onclick="location.href='aiquiz.html'">🎯 Play Quiz</button>
<button onclick="location.href='leaderboard.html'">🏆 Leaderboard</button>
<button onclick="logout()">🚪 Logout</button>
<button onclick="switchAccount()">🔄 Switch Account</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
authDomain:"dhannjay-website.firebaseapp.com",
databaseURL:"https://dhannjay-website-default-rtdb.firebaseio.com",
projectId:"dhannjay-website"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const provider = new GoogleAuthProvider();

let chart;

/* LOGIN */
window.login = function(){
signInWithPopup(auth, provider).then(()=>{
location.reload();
});
};

/* LOGOUT */
window.logout = function(){
signOut(auth).then(()=>location.reload());
};

/* SWITCH ACCOUNT */
window.switchAccount = function(){
provider.setCustomParameters({ prompt:"select_account" });
signInWithPopup(auth, provider).then(()=>location.reload());
};

/* AUTH STATE */
onAuthStateChanged(auth, user => {

if(!user){
document.getElementById("loginBox").style.display="block";
document.getElementById("profileBox").style.display="none";
return;
}

// show profile
document.getElementById("loginBox").style.display="none";
document.getElementById("profileBox").style.display="block";

document.getElementById("name").innerText = user.displayName;
document.getElementById("email").innerText = user.email;
document.getElementById("photo").src = user.photoURL;

// verify status
document.getElementById("verifyStatus").innerText =
user.emailVerified ? "✅ Verified" : "❌ Not Verified";

/* LOAD DATA */
onValue(ref(db,"leaderboard"), snap => {

let data = snap.val();
if(!data) return;

let total=0,count=0,best=0;
let scores=[];
let totals={};

Object.values(data).forEach(d=>{

if(!d.email || !d.score) return;

if(!totals[d.email]) totals[d.email]=0;
totals[d.email]+=Number(d.score);

if(d.email===user.email){
total+=Number(d.score);
count++;
scores.push(Number(d.score));
if(d.score>best) best=d.score;
}

});

document.getElementById("total").innerText = total;
document.getElementById("count").innerText = count;

let sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
let index = sorted.findIndex(u=>u[0]===user.email);
let rank = index === -1 ? "-" : index+1;

document.getElementById("rank").innerText = "#"+rank;

drawGraph(scores);
loadBadges(total,count,best,rank);

});

});

/* GRAPH */
function drawGraph(scores){
const ctx = document.getElementById("chart");
if(chart) chart.destroy();

chart = new Chart(ctx,{
type:"line",
data:{
labels:scores.map((_,i)=>"Quiz "+(i+1)),
datasets:[{
label:"Score",
data:scores
}]
}
});
}

/* BADGES */
function loadBadges(total,count,best,rank){
let b = document.getElementById("badges");
b.innerHTML="";

if(count>=1) b.innerHTML+="🟢 Beginner ";
if(count>=5) b.innerHTML+="🔵 Explorer ";
if(count>=10) b.innerHTML+="🟣 Master ";
if(best>=20) b.innerHTML+="🟡 Genius ";
if(rank===1) b.innerHTML+="🔴 Champion ";
}

</script>

</body>
  </html>
