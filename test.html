<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{margin:0;font-family:Arial;background:black;color:white;}
.header{text-align:center;padding:15px;font-size:20px;border-bottom:1px solid #333;}
.container{text-align:center;padding:20px;}

img{
width:100px;height:100px;border-radius:50%;
object-fit:cover;border:2px solid #ff0066;
}

.name{font-size:18px;margin-top:10px;}
.bio{opacity:0.7;font-size:14px;}

input,textarea{
width:90%;margin:8px;padding:10px;
border:none;border-radius:10px;background:#111;color:white;
}

button{
width:90%;padding:10px;border:none;
border-radius:10px;background:#ff0066;color:white;
margin-top:10px;font-size:16px;
}
</style>
</head>

<body>

<div class="header">🔥 My Profile</div>

<div class="container">

<img id="photo" src="https://via.placeholder.com/100">

<div class="name" id="showName">Loading...</div>
<div id="email"></div>
<div class="bio" id="showBio"></div>

<input id="name" placeholder="Name">
<textarea id="bio" placeholder="Bio"></textarea>
<input id="phone" placeholder="Phone">

<input type="file" id="file">

<button onclick="uploadPhoto()">Upload Photo</button>
<button onclick="saveProfile()">Save Profile</button>
<button onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getAuth, 
  onAuthStateChanged, 
  signOut,
  updateProfile 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { 
  getStorage, 
  ref, 
  uploadBytes, 
  getDownloadURL 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  projectId: "dhannjay-website",
  storageBucket: "dhannjay-website.firebasestorage.app",
  appId: "1:73314948186:web:e7d64f04ba3221a21df463"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser;

// 🔥 LOAD USER
onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUser = user;

    // Auth data
    email.innerText = user.email;
    showName.innerText = user.displayName || "No Name";
    photo.src = user.photoURL || "https://via.placeholder.com/100";

    // Firestore data
    const refDoc = doc(db,"users",user.uid);
    const snap = await getDoc(refDoc);

    if(snap.exists()){
      const data = snap.data();

      showBio.innerText = data.bio || "";

      name.value = data.name || user.displayName || "";
      bio.value = data.bio || "";
      phone.value = data.phone || "";
    }

  } else {
    window.location.href="index.html";
  }
});

// 🔥 SAVE PROFILE
window.saveProfile = async function(){

  const nameVal = name.value;
  const bioVal = bio.value;
  const phoneVal = phone.value;

  if(!nameVal){
    alert("Name required ❌");
    return;
  }

  // 🔥 Update Auth
  await updateProfile(currentUser,{
    displayName: nameVal,
    photoURL: currentUser.photoURL || photo.src
  });

  // 🔥 Save Firestore
  await setDoc(doc(db,"users",currentUser.uid),{
    name:nameVal,
    bio:bioVal,
    phone:phoneVal
  });

  showName.innerText = nameVal;
  showBio.innerText = bioVal;

  alert("Profile updated ✅");
}

// 🔥 UPLOAD PHOTO
window.uploadPhoto = async function(){

  const file = document.getElementById("file").files[0];

  if(!file){
    alert("File select करा ❌");
    return;
  }

  const storageRef = ref(storage,"profile/"+currentUser.uid);

  await uploadBytes(storageRef,file);

  const url = await getDownloadURL(storageRef);

  // 🔥 Update Auth photo
  await updateProfile(currentUser,{
    photoURL: url
  });

  photo.src = url;

  alert("Photo updated ✅");
}

// 🔥 LOGOUT
window.logout = function(){
  signOut(auth);
  window.location.href="index.html";
}

</script>

</body>
</html>
