<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0a0f1c;
      color:white;
    }

    .container{
      max-width:400px;
      margin:auto;
      padding:15px;
    }

    /* PROFILE */
    .profile{
      text-align:center;
      background:#111827;
      padding:20px;
      border-radius:15px;
    }

    .profile img{
      width:90px;
      height:90px;
      border-radius:50%;
      border:3px solid #ff007f;
    }

    .name{font-size:20px;font-weight:bold;margin-top:10px;}
    .email{font-size:13px;color:#aaa;}

    .stats{
      display:flex;
      justify-content:space-around;
      margin-top:15px;
    }

    /* STORY */
    .stories{
      display:flex;
      overflow-x:auto;
      margin:15px 0;
      gap:10px;
    }

    .story{
      min-width:70px;
      text-align:center;
    }

    .story img{
      width:60px;
      height:60px;
      border-radius:50%;
      border:3px solid #ff007f;
    }

    /* QUIZ */
    .quiz{
      background:#111827;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
    }

    button{
      margin:5px;
      padding:10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .login{background:#3b82f6;color:white;}
    .logout{background:#ef4444;color:white;}
    .answer{background:#374151;color:white;}
  </style>
</head>

<body>

<div class="container">

  <!-- PROFILE -->
  <div class="profile">
    <img id="photo">
    <div class="name" id="name">Loading...</div>
    <div class="email" id="email"></div>

    <div class="stats">
      <div>
        <h3 id="score">0</h3>
        <p>Score</p>
      </div>
    </div>

    <button class="login" onclick="login()">Login</button>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- STORIES -->
  <div class="stories" id="stories"></div>

  <!-- QUIZ -->
  <div class="quiz">
    <h3 id="question"></h3>
    <div id="answers"></div>
    <button onclick="nextQ()">Next</button>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  databaseURL: "https://dhannjay-website-default-rtdb.firebaseio.com",
  projectId: "dhannjay-website",
  storageBucket: "dhannjay-website.firebasestorage.app",
  messagingSenderId: "73314948186",
  appId: "1:73314948186:web:e7d64f04ba3221a21df463"
};

firebase.initializeApp(firebaseConfig);

// 🔥 SESSION FIX
firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

const auth = firebase.auth();
const db = firebase.database();

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// LOGOUT
function logout(){
  auth.signOut();
}

// STORY LOAD
function loadStories(user){
  const stories = document.getElementById("stories");
  stories.innerHTML = "";

  if(user){
    stories.innerHTML += `
      <div class="story">
        <img src="${user.photoURL}">
        <p>You</p>
      </div>`;
  }

  const demo = ["🔥","🎮","🏆","⚡"];
  demo.forEach(d=>{
    stories.innerHTML += `
      <div class="story">
        <img src="https://via.placeholder.com/60">
        <p>${d}</p>
      </div>`;
  });
}

// AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("name").innerText = user.displayName;
    document.getElementById("email").innerText = user.email;
    document.getElementById("photo").src = user.photoURL;

    db.ref("users/"+user.uid).update({
      name:user.displayName,
      email:user.email,
      photo:user.photoURL
    });

    db.ref("users/"+user.uid+"/score").on("value", snap=>{
      document.getElementById("score").innerText = snap.val() || 0;
    });

    loadStories(user);

  } else {
    document.getElementById("name").innerText = "Not Logged In";
  }
});

// QUIZ
const questions = [
  {q:"India capital?",a:["Delhi","Mumbai","Pune"],c:0},
  {q:"2+2=?",a:["3","4","5"],c:1},
  {q:"Sun rises from?",a:["West","East","North"],c:1}
];

let index=0,score=0;

function loadQ(){
  document.getElementById("question").innerText = questions[index].q;
  let ans="";
  questions[index].a.forEach((opt,i)=>{
    ans += `<button class="answer" onclick="checkAns(${i})">${opt}</button>`;
  });
  document.getElementById("answers").innerHTML = ans;
}

function checkAns(i){
  if(i===questions[index].c) score+=10;
}

function nextQ(){
  index++;
  if(index<questions.length){
    loadQ();
  }else{
    finishQuiz();
  }
}

function finishQuiz(){
  alert("Score: "+score);
  saveScore(score);
  index=0;
  score=0;
  loadQ();
}

// SAVE SCORE
function saveScore(score){
  const user = firebase.auth().currentUser;
  if(user){
    firebase.database().ref("users/"+user.uid).update({
      score:score
    });
  }
}

loadQ();
</script>

</body>
  </html>
