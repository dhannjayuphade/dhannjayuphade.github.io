<!DOCTYPE html>
<html lang="en">
<head>

<style>

    background:linear-gradient(120deg,#0f172a,#1e293b);

    text-align:center;

header{
    padding:40px;
    background:#111827;
}

h1{
    font-size:35px;

}

    </div>

        <h2>🎥 YouTube Channel</h2>
        <p>Dhananjay Gaming 2.0</p>

    <div class="card">
