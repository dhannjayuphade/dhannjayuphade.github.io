<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Hub Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#1f1c2c,#928dab);color:white;text-align:center}
.app{max-width:400px;margin:auto;padding:15px}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#00ffcc}
.card{background:#222;padding:10px;margin:10px;border-radius:10px;cursor:pointer}
</style>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push, onValue, set }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDz443NrLvqfceSGMzNPThMS3vuJ2z0vPY",
  authDomain: "dhannjay-website.firebaseapp.com",
  databaseURL: "https://dhannjay-website-default-rtdb.firebaseio.com",
  projectId: "dhannjay-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getDatabase(app);

// LOGIN
window.googleLogin = async function(){
  const result = await signInWithPopup(auth, provider);
  localStorage.setItem("user", result.user.displayName);
  showHome();
};

// AUTO LOGIN
onAuthStateChanged(auth,(user)=>{
  if(user){
    localStorage.setItem("user", user.displayName);
    showHome();
  }
});

// LOGOUT
window.logout = function(){
  signOut(auth);
  localStorage.clear();
  location.reload();
};

// SAVE SCORE
window.saveScore = function(score){
  push(ref(db,"leaderboard"),{
    name: localStorage.getItem("user"),
    score: score
  });
};

// LOAD LEADERBOARD
window.loadLeaderboard = function(){
  onValue(ref(db,"leaderboard"),(snap)=>{
    let data = snap.val();
    let list = document.getElementById("leaderList");
    list.innerHTML = "";

    if(data){
      let arr = Object.values(data);
      arr.sort((a,b)=>b.score-a.score);

      arr.slice(0,10).forEach((p,i)=>{
        list.innerHTML += `<li>#${i+1} ${p.name} - ${p.score}</li>`;
      });
    }
  });
};

// ✅ GLOBAL PDF FUNCTION (FIXED)
window.generatePDF = async function(){

  document.getElementById("certificateBox").style.display="block";

  let user = localStorage.getItem("user");
  let score = localStorage.getItem("score");

  document.getElementById("certName").innerText = user;

  let today = new Date().toLocaleDateString();
  document.getElementById("certDate").innerText = today;

  let id = "QUIZ-" + currentTopic + "-" + Date.now();
  document.getElementById("certID").innerText = id;

  set(ref(db,"certificates/"+id),{
    name:user,
    score:score,
    topic:currentTopic,
    date:today
  });

  let title = currentTopic.toUpperCase() + " QUIZ CERTIFICATE";
  let text = `Scored ${score} marks in ${currentTopic.toUpperCase()} quiz`;

  document.getElementById("quizTitle").innerText = title;
  document.getElementById("certText").innerText = text;

  await new Promise(r=>setTimeout(r,500));

  const cert = document.getElementById("certificate");
  const canvas = await html2canvas(cert);
  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("landscape");

  pdf.addImage(imgData,'PNG',10,10,270,180);
  pdf.save(title + ".pdf");

  document.getElementById("certificateBox").style.display="none";
};

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app">

<!-- LOGIN -->
<div id="loginBox">
<h2>Quiz App</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>

<!-- HOME -->
<div id="homeBox" style="display:none;">
<h3>Hello, <span id="userName"></span></h3>

<div class="card" onclick="startQuiz('gk')">GK Quiz</div>
<div class="card" onclick="startQuiz('science')">Science Quiz</div>
<div class="card" onclick="startQuiz('history')">History Quiz</div>

<div class="card" onclick="loadLeaderboard()">Leaderboard</div>

<button onclick="logout()">Logout</button>
</div>

<!-- QUIZ -->
<div id="quizBox" style="display:none;">
<h3 id="timer">5:00</h3>
<h2 id="question"></h2>
<div id="options"></div>
</div>

<!-- RESULT -->
<div id="resultBox" style="display:none;">
<h2 id="scoreText"></h2>
<button onclick="generatePDF()">Download Certificate</button>
</div>

<!-- CERTIFICATE -->
<div id="certificateBox" style="display:none;">
<div id="certificate" style="width:800px;padding:30px;background:white;color:black;text-align:center;border:10px solid orange;border-radius:15px;font-family:Georgia;">
<h2>Certificate of Participation</h2>

<h3 id="quizTitle"></h3>

<p>This certificate is awarded to</p>

<h1 id="certName"></h1>

<p id="certText"></p>

<p>Date: <span id="certDate"></span></p>
<p>ID: <span id="certID"></span></p>

<hr>

<p>Instagram: @dhannjayuphade</p>
<p>Email: dhannjayuphade5@gmail.com</p>

<h4 style="color:orange;">Dhananjay Uphade</h4>
</div>
</div>

<ul id="leaderList"></ul>

</div>

<script>

// GLOBAL VARIABLES
let current=[],i=0,score=0;
let currentTopic="";

// HOME
function showHome(){
  loginBox.style.display="none";
  homeBox.style.display="block";
  quizBox.style.display="none";
  resultBox.style.display="none";
  userName.innerText = localStorage.getItem("user");
}

// QUESTIONS (same structure)
let questions = {
gk:[
{q:"Capital of India?",o:["Mumbai","Delhi","Pune","Nagpur"],a:"Delhi"},
{q:"National animal?",o:["Lion","Tiger","Dog","Cat"],a:"Tiger"}
],
science:[
{q:"Water formula?",o:["CO2","H2O","O2","NaCl"],a:"H2O"},
{q:"Sun is?",o:["Planet","Star","Moon","Rock"],a:"Star"}
],
history:[
{q:"First PM India?",o:["Nehru","Gandhi","Patel","Modi"],a:"Nehru"},
{q:"Taj Mahal built by?",o:["Shah Jahan","Akbar","Babur","Aurangzeb"],a:"Shah Jahan"}
]
};

// START QUIZ
function startQuiz(topic){
  currentTopic = topic;
  current = questions[topic];
  i=0; score=0;

  homeBox.style.display="none";
  quizBox.style.display="block";

  showQ();
  timerStart();
}

// SHOW QUESTION
function showQ(){
  if(i>=current.length){showResult();return;}

  question.innerText = current[i].q;
  options.innerHTML = "";

  current[i].o.forEach(v=>{
    let btn = document.createElement("button");
    btn.innerText = v;
    btn.onclick = ()=>check(v);
    options.appendChild(btn);
  });
}

// CHECK ANSWER
function check(ans){
  if(ans === current[i].a) score++;
  i++;
  showQ();
}

// TIMER
function timerStart(){
  let time = 300;

  let t = setInterval(()=>{
    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    timer.innerText = `${m}:${s<10?"0"+s:s}`;

    if(time<=0){
      clearInterval(t);
      showResult();
    }
  },1000);
}

// RESULT
function showResult(){
  quizBox.style.display="none";
  resultBox.style.display="block";
  scoreText.innerText = "Score: " + score;

  localStorage.setItem("score",score);
  saveScore(score);
  loadLeaderboard();
}

</script>

</body>
  </html>
